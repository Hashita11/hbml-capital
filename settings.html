<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - System Settings</title>
    <!-- Modern Tailwind CSS V4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-6 flex flex-col items-center justify-center">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-5 md:p-6 shadow-2xl space-y-6">
        
        <!-- TOP CONTROL NAVIGATION -->
        <div class="flex justify-between items-center">
            <a href="admin.html" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl transition">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            <span class="text-[10px] font-black uppercase bg-purple-500/10 text-purple-400 px-2.5 py-1 rounded-md border border-purple-500/20 shadow-xs tracking-wider">
                System Config
            </span>
        </div>

        <!-- BRANDING HEADER -->
        <div class="text-center space-y-2 py-2">
            <img src="logo.png" alt="HBML Logo" class="h-14 w-auto mx-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').classList.remove('hidden')">
            <div id="fallback-icon" class="h-14 w-14 bg-slate-900 text-sky-400 rounded-xl flex items-center justify-center text-2xl font-black shadow-md border border-slate-800 hidden mx-auto">H</div>
            <h1 class="text-xl font-black tracking-tight uppercase">System Settings</h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Configure Enterprise Global Parameters</p>
        </div>

        <!-- ⚙️ DATA INPUT FIELDS -->
        <div class="space-y-4 text-left text-xs">
            
            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block">Company Name</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-slate-500"><i class="fa-solid fa-building"></i></span>
                    <input type="text" id="txtCompanyName" placeholder="e.g. HBML CAPITAL" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 font-bold text-white focus:outline-hidden focus:border-sky-500 transition">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block">Default Interest Rate (%)</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-slate-500"><i class="fa-solid fa-percent"></i></span>
                    <input type="number" id="txtInterestRate" placeholder="e.g. 24" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 font-mono font-bold text-white focus:outline-hidden focus:border-sky-500 transition">
                </div>
            </div>

            <div class="space-y-1.5 border-t border-slate-800 pt-4">
                <label class="text-[10px] font-black text-rose-400 uppercase tracking-wider block">Change Admin Secret Key</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-slate-500"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="txtAdminPassword" placeholder="Enter New Key (e.g. 9000)" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 font-mono font-bold text-white focus:outline-hidden focus:border-rose-500 transition">
                </div>
            </div>

        </div>

        <!-- DISPATCH SUBMIT TRIGGER -->
        <button onclick="updateSystemSettings()" id="btnSave" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-md tracking-wider text-xs uppercase flex items-center justify-center gap-2 cursor-pointer active:scale-98">
            <i class="fa-solid fa-floppy-disk" id="saveIcon"></i> Save System Config
        </button>

    </div>

    <!-- FIREBASE PLATFORM ENGINE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // మాస్టర్ డాక్యుమెంట్ రెఫరెన్స్ నోడ్
        const configDocRef = doc(db, "system_config", "global_settings");

        /* 🔄 క్లౌడ్ నుండి పాత కాన్ఫిగరేషన్ ని లోడ్ చేసే ఫంక్షన్ */
        async function loadCurrentSystemSettings() {
            try {
                const snap = await getDoc(configDocRef);
                if(snap.exists()) {
                    const data = snap.data();
                    document.getElementById("txtCompanyName").value = data.companyName || "HBML CAPITAL";
                    document.getElementById("txtInterestRate").value = data.defaultInterestRate || "24";
                    document.getElementById("txtAdminPassword").value = data.adminSecretKey || "9000";
                } else {
                    // డీఫాల్ట్ నింపడం
                    document.getElementById("txtCompanyName").value = "HBML CAPITAL";
                    document.getElementById("txtInterestRate").value = "24";
                    document.getElementById("txtAdminPassword").value = "9000";
                }
            } catch (error) {
                console.error("Config fetch timeout: ", error);
            }
        }

        /* 💾 క్లౌడ్ లోకి కొత్త కాన్ఫిగరేషన్ ని రైట్ చేసే ఫంక్షన్ */
        window.updateSystemSettings = async function() {
            let company = document.getElementById("txtCompanyName").value.trim();
            let rate = document.getElementById("txtInterestRate").value.trim();
            let pass = document.getElementById("txtAdminPassword").value.trim();

            if(!company || !rate || !pass) {
                alert("Please fill all configuration parameters before committing.");
                return;
            }

            const btn = document.getElementById("btnSave");
            const icon = document.getElementById("saveIcon");
            btn.disabled = true;
            btn.classList.add("opacity-50");
            icon.className = "fa-solid fa-spinner animate-spin";

            try {
                await setDoc(configDocRef, {
                    companyName: company,
                    defaultInterestRate: Number(rate),
                    adminSecretKey: pass,
                    lastUpdated: new Date()
                });

                alert("Global Settings Node Updated Successfully on Cloud Server!");
            } catch (error) {
                alert("Database write error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.classList.remove("opacity-50");
                icon.className = "fa-solid fa-floppy-disk";
            }
        }

        window.addEventListener('DOMContentLoaded', loadCurrentSystemSettings);
    </script>
</body>
</html>
