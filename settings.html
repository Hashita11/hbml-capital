<!DOCTYPE html>
<html>
<head>

<title>HBML Settings</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>HBML Settings</h1>

<input type="text"
placeholder="Company Name">

<input type="number"
placeholder="Default Interest Rate">

<input type="password"
placeholder="Change Admin Password">

<button onclick="saveSettings()">

Save Settings

</button>

</div>

<script>

function saveSettings(){

alert("Settings Saved");

}

</script>

</body>
</html>
