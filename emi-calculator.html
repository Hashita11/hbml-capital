<!DOCTYPE html>
<html>

<head>

<title>HBML EMI Calculator</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f4f8;
padding:20px;
}

/* MAIN BOX */

.box{
max-width:550px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* LOGO */

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

/* TITLE */

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:25px;
}

/* INPUT */

input{
width:100%;
padding:15px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

/* BUTTON */

button{
width:100%;
padding:15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#163c91;
}

/* RESULT */

.result{
margin-top:25px;
background:#f7f9fc;
padding:20px;
border-radius:15px;
}

.result h2{
color:#0d2b6b;
margin-bottom:15px;
text-align:center;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #ddd;
}

.label{
font-weight:bold;
color:#0d2b6b;
}

.value{
color:#333;
}

/* MOBILE */

@media(max-width:600px){

.row{
flex-direction:column;
gap:5px;
}

}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>HBML EMI Calculator</h1>

<input type="number"
id="loan"
placeholder="Loan Amount">

<input type="number"
id="interest"
placeholder="Annual Interest Rate (%)">

<input type="number"
id="months"
placeholder="Loan Duration (Months)">

<button onclick="calculateEMI()">

Calculate EMI

</button>

<div class="result">

<h2>EMI Result</h2>

<div class="row">
<div class="label">Monthly EMI</div>
<div class="value" id="emi">
₹0
</div>
</div>

<div class="row">
<div class="label">Total Interest</div>
<div class="value" id="totalInterest">
₹0
</div>
</div>

<div class="row">
<div class="label">Total Payment</div>
<div class="value" id="totalPayment">
₹0
</div>
</div>

</div>

</div>

<script>

function calculateEMI(){

let loan =
parseFloat(document.getElementById("loan").value);

let annualInterest =
parseFloat(document.getElementById("interest").value);

let months =
parseFloat(document.getElementById("months").value);

if(isNaN(loan) ||
isNaN(annualInterest) ||
isNaN(months)){

alert("Please Fill All Fields");

return;

}

/* EMI FORMULA */

let monthlyInterest =
annualInterest / 12 / 100;

let emi =

(loan * monthlyInterest *
Math.pow(1 + monthlyInterest, months))

/

(Math.pow(1 + monthlyInterest, months) - 1);

let totalPayment =
emi * months;

let totalInterest =
totalPayment - loan;

/* DISPLAY */

document.getElementById("emi")
.innerHTML =
"₹" + emi.toFixed(2);

document.getElementById("totalInterest")
.innerHTML =
"₹" + totalInterest.toFixed(2);

document.getElementById("totalPayment")
.innerHTML =
"₹" + totalPayment.toFixed(2);

}

</script>

</body>
</html>
