<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Registered Borrowers Directory</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-6">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center gap-2">
            <a href="admin.html" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl transition">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            <div class="flex gap-2 text-[10px] font-mono font-black uppercase">
                <span class="bg-slate-900 text-sky-400 px-2.5 py-1.5 rounded-xl border border-slate-800">Total Users: <span id="totalCustomers">0</span></span>
                <span class="bg-slate-900 text-emerald-400 px-2.5 py-1.5 rounded-xl border border-slate-800">Total Book: <span id="totalLoan">₹0</span></span>
            </div>
        </div>

        <div class="text-center space-y-2 py-2">
            <img src="logo.png" alt="HBML Logo" class="h-14 w-auto mx-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').classList.remove('hidden')">
            <div id="fallback-icon" class="h-14 w-14 bg-slate-900 text-sky-400 rounded-xl flex items-center justify-center text-2xl font-black shadow-md border border-slate-800 hidden mx-auto">H</div>
            <h1 class="text-xl md:text-2xl font-black tracking-tight uppercase">Borrowers Directory</h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Search active profiles or view digital profile cards</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 p-3 rounded-2xl shadow-md">
            <div class="relative">
                <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-magnifying-glass"></i></span>
                <input type="text" id="search" onkeyup="searchCustomer()" placeholder="Search borrower by name or phone number..." class="w-full text-xs bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3.5 font-bold text-white focus:outline-hidden focus:border-sky-500 transition">
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-4 bg-slate-900/40 border-b border-slate-800">
                <span class="text-xs font-black uppercase text-slate-400 tracking-wider"><i class="fa-solid fa-address-book text-sky-500 mr-1.5"></i> Active Borrower Ledgers</span>
            </div>
            
            <div id="customerListContainer" class="divide-y divide-slate-800/60 font-medium">
                <div class="p-8 text-center text-slate-500 font-bold animate-pulse">
                    <i class="fa-solid fa-spinner animate-spin mr-2 text-sky-400"></i> ఫైర్‌బేస్ నుండి కస్టమర్ల డేటా లోడ్ అవుతోంది...
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadBorrowersDirectory() {
            const container = document.getElementById("customerListContainer");
            try {
                const snap = await getDocs(collection(db, "customers"));
                
                if(snap.empty) {
                    container.innerHTML = `<div class="p-8 text-center text-slate-600 font-bold">No active borrower records detected in database.</div>`;
                    return;
                }

                let html = "";
                let totalCustomers = 0;
                let totalLoanAmountSum = 0;
                
                snap.forEach((docRecord) => {
                    const data = docRecord.data();
                    const docId = docRecord.id; 
                    const cleanName = data.name || "Unknown Borrower";
                    
                    let emiValue = Number(data.emi || 0);
                    let tenure = Number(data.tenureMonths || data.months || 12);
                    let totalLoanWithInterest = emiValue * tenure;

                    if (totalLoanWithInterest <= 0) {
                        totalLoanWithInterest = Number(data.loanPrincipal || data.loan || 0);
                    }

                    let paid = Number(data.paid || 0);
                    let balance = totalLoanWithInterest - paid;
                    if(balance < 0) balance = 0;

                    totalCustomers++;
                    totalLoanAmountSum += Number(data.loanPrincipal || 0);

                    let displayUID = data.customerId || "HBML-" + docId.substring(0, 5).toUpperCase();

                    // 👑 🛠️ ఇక్కడ బటన్ ఆన్‌క్లిక్ లోపల డైరెక్ట్‌గా రూటింగ్ లింక్‌ను ఇంజెక్ట్ చేశాను, ఫంక్షన్ల క్లాష్ రాదు!
                    html += `
                        <div class="p-4 flex justify-between items-center bg-slate-900/40 hover:bg-slate-900 transition gap-4 client-row-item" data-name="${cleanName.toLowerCase()}" data-phone="${(data.phone || '').toLowerCase()}">
                            <div class="space-y-0.5">
                                <div class="font-black text-white text-sm uppercase">${cleanName}</div>
                                <div class="flex flex-wrap gap-x-2 gap-y-0.5 text-[10px] font-mono font-bold text-slate-500 uppercase">
                                    <span class="text-sky-400">${displayUID}</span>
                                    <span>•</span>
                                    <span>${data.phone || 'No Phone'}</span>
                                    <span>•</span>
                                    <span class="text-slate-400">${data.address || 'Tanuku'}</span>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-3">
                                <div class="hidden sm:block text-right">
                                    <div class="text-[9px] font-bold text-slate-500 uppercase">Outstanding</div>
                                    <div class="text-xs font-mono font-black text-amber-500">₹${Math.round(balance).toLocaleString('en-IN')}</div>
                                </div>
                                <button onclick="localStorage.setItem('last_viewed_customer_id', '${docId}'); window.location.href='customer-profile.html?id=${docId}'" class="bg-slate-950 hover:bg-slate-800 text-sky-400 hover:text-white border border-slate-800 hover:border-sky-500/40 font-bold text-xs py-2 px-3.5 rounded-xl transition cursor-pointer flex items-center gap-1.5 active:scale-95 shrink-0">
                                    Profile Card <i class="fa-solid fa-chevron-right text-[10px]"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

                document.getElementById("totalCustomers").innerText = totalCustomers;
                document.getElementById("totalLoan").innerText = "₹" + totalLoanAmountSum.toLocaleString('en-IN');

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="p-8 text-center text-rose-500 font-bold">Cloud fetch failed.</div>`;
            }
        }

        window.searchCustomer = function() {
            let filter = document.getElementById("search").value.toLowerCase().trim();
            let rows = document.getElementsByClassName("client-row-item");

            for (let i = 0; i < rows.length; i++) {
                let nameAttr = rows[i].getAttribute("data-name") || "";
                let phoneAttr = rows[i].getAttribute("data-phone") || "";

                if (nameAttr.includes(filter) || phoneAttr.includes(filter)) {
                    rows[i].style.setProperty("display", "flex", "important");
                } else {
                    rows[i].style.setProperty("display", "none", "important");
                }
            }
        }

        window.addEventListener('DOMContentLoaded', loadBorrowersDirectory);
    </script>
</body>
</html>
