<!DOCTYPE html>
<html>

<head>

<title>View Customers</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:1100px;
margin:auto;
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

.summary{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.card{
padding:15px 25px;
border-radius:10px;
color:white;
font-weight:bold;
}

.blue{
background:#0d2b6b;
}

.green{
background:green;
}

.search{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
margin-bottom:20px;
font-size:16px;
}

.table-box{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0d2b6b;
color:white;
padding:14px;
}

table td{
padding:14px;
border-bottom:1px solid #ddd;
text-align:center;
}

.btn{
padding:10px 15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn:hover{
background:#163c91;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>HBML Customer Database</h1>

<div class="summary">

<div class="card blue">
Total Customers:
<span id="totalCustomers">0</span>
</div>

<div class="card green">
Total Loan:
<span id="totalLoan">₹0</span>
</div>

</div>
  
<input
type="text"
class="search"
id="search"
placeholder="Search Customer..."
onkeyup="searchCustomer()">

<div class="table-box">

<table id="customerTable">

<tr>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Loan</th>
<th>EMI</th>
<th>Action</th>
</tr>

</table>

</div>

</div>
<button class="btn" onclick="alert('Edit Page Coming Soon')">
Edit Customer
</button>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",

authDomain: "hbml-capital.firebaseapp.com",

projectId: "hbml-capital",

storageBucket: "hbml-capital.firebasestorage.app",

messagingSenderId: "893969951538",

appId: "1:893969951538:web:ba028463a6adcfb417c52b"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function loadCustomers(){

const querySnapshot =
await getDocs(collection(db,"customers"));

const table =
document.getElementById("customerTable");

let totalCustomers = 0;
let totalLoan = 0;

querySnapshot.forEach((doc)=>{

const data = doc.data();

totalCustomers++;
totalLoan += Number(data.loan || 0);

let row = table.insertRow();

row.insertCell(0).innerHTML =
data.name || "";

row.insertCell(1).innerHTML =
data.phone || "";

row.insertCell(2).innerHTML =
data.address || "";

row.insertCell(3).innerHTML =
"₹" + (data.loan || 0);

row.insertCell(4).innerHTML =
"₹" + (data.emi || 0);

row.insertCell(5).innerHTML =
`<button class="btn" onclick="location.href='customer-details.html?id=${doc.id}'">View</button>`;
});

document.getElementById("totalCustomers").innerHTML =
totalCustomers;

document.getElementById("totalLoan").innerHTML =
"₹" + totalLoan.toLocaleString();

}

loadCustomers();

window.searchCustomer = function(){

let input =
document.getElementById("search")
.value.toLowerCase();

let table =
document.getElementById("customerTable");

let tr =
table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let td =
tr[i].getElementsByTagName("td")[0];

if(td){

let txt =
td.textContent || td.innerText;

tr[i].style.display =
txt.toLowerCase().indexOf(input)>-1
? ""
: "none";

}

}

}

</script>

</body>
</html>
