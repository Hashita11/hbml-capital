<!DOCTYPE html>
<html>
<head>

<title>Customer Search</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:1px solid #ccc;
border-radius:10px;
margin-bottom:20px;
}

.result{
background:#f7f9fc;
padding:20px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>Customer Search</h1>

<input type="text"
placeholder="Search Customer Name">

<div class="result">

<h3>Ramesh</h3>

<p>Loan : ₹50,000</p>

<p>EMI : ₹5,000</p>

<p>Status : Active</p>

</div>

</div>

</body>
</html>
