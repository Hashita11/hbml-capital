<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - EMI Collection View</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-6">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center gap-2">
            <a href="admin.html" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl transition">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            <span class="text-[10px] font-black uppercase bg-amber-500/10 text-emerald-400 px-2.5 py-1 rounded-md border border-emerald-500/20 shadow-xs tracking-wider">
                <i class="fa-solid fa-shield-halved text-emerald-500 mr-1"></i> Anti-Duplicate Filter Active
            </span>
        </div>

        <div class="text-center space-y-2 py-2">
            <img src="logo.png" alt="HBML Logo" class="h-14 w-auto mx-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').classList.remove('hidden')">
            <div id="fallback-icon" class="h-14 w-14 bg-slate-900 text-amber-400 rounded-xl flex items-center justify-center text-2xl font-black shadow-md border border-slate-800 hidden mx-auto">H</div>
            <h1 class="text-xl md:text-2xl font-black tracking-tight uppercase">Global Payment History</h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Real-Time Daily Collection Day Book</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-xl overflow-hidden">
            <div class="p-4 bg-slate-900/40 border-b border-slate-800 flex justify-between items-center">
                <span class="text-xs font-black uppercase text-slate-400 tracking-wider">
                    <i class="fa-solid fa-clock-history text-sky-500 mr-1.5"></i> All Received Transactions Log
                </span>
                <span id="lblRowsCounter" class="text-xs font-mono font-bold bg-slate-950 px-3 py-1 rounded border border-slate-800 text-slate-400">Rows : 0</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse min-w-[500px]">
                    <thead class="bg-slate-950 text-slate-400 font-bold uppercase tracking-wider border-b border-slate-800">
                        <tr>
                            <th class="p-4">Payment Date</th>
                            <th class="p-4">Customer Name / ID</th>
                            <th class="p-4 text-emerald-400">EMI Recovered</th>
                        </tr>
                    </thead>
                    <tbody id="tblCollectionBody" class="divide-y divide-slate-800 font-medium text-slate-300">
                        <tr>
                            <td colspan="3" class="p-8 text-center text-slate-500 font-bold">
                                <i class="fa-solid fa-spinner animate-spin mr-2 text-sky-400"></i> రికార్డులను సేకరిస్తున్నాము...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadEmiCollectionsLedger() {
            const tbody = document.getElementById("tblCollectionBody");
            try {
                const snap = await getDocs(collection(db, "emi_collections"));

                if(snap.empty) {
                    tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-slate-500 font-bold">No collections recorded yet.</td></tr>`;
                    document.getElementById("lblRowsCounter").innerText = "Rows : 0";
                    return;
                }

                let records = [];
                // 👑 🛡️ మ్యాజికల్ యాంటీ-డూప్లికేట్ సెట్ ట్రాకర్ (ఒకే ఐడీని లైఫ్‌లో రెండుసార్లు రానివ్వదు)
                let uniqueDocIdsTracker = new Set();

                snap.forEach(doc => {
                    let data = doc.data();
                    let docId = doc.id;
                    
                    // కస్టమర్ ఐడీ, కట్టిన అమౌంట్, తేదీల కలయికను ఒక యూనిక్ కీ గా మార్చడం
                    let uniqueKey = `${data.customerId || ''}_${data.customerName || ''}_${data.emiAmountPaid || 0}_${data.date?.seconds || data.date || ''}`;

                    // ఒకవేళ ఈ యూనిక్ కీ లేదా డాక్యుమెంట్ ఐడీ ఆల్రెడీ ఉంటే స్కిప్ చేస్తుంది
                    if (!uniqueDocIdsTracker.has(docId) && !uniqueDocIdsTracker.has(uniqueKey)) {
                        uniqueDocIdsTracker.add(docId);
                        uniqueDocIdsTracker.add(uniqueKey);
                        records.push({ id: docId, ...data });
                    }
                });

                // తేదీల ప్రకారం లేటెస్ట్ ట్రాన్సాక్షన్స్ పైకి వచ్చేలా సార్టింగ్
                records.sort((a, b) => {
                    let dateA = a.date?.seconds ? a.date.seconds : new Date(a.date || 0).getTime();
                    let dateB = b.date?.seconds ? b.date.seconds : new Date(b.date || 0).getTime();
                    return dateB - dateA;
                });

                let html = "";
                let rowCount = 0;

                records.forEach((row) => {
                    rowCount++;
                    let displayDate = "—";
                    if(row.date) {
                        let dateObj = row.date.seconds ? new Date(row.date.seconds * 1000) : new Date(row.date);
                        
                        // స్క్రీన్‌షాట్‌లో ఉన్నట్లే పక్కాగా "27 Jun 2026" ఫార్మాట్‌లోకి మార్చడం
                        let day = dateObj.getDate();
                        let month = dateObj.toLocaleString('en-US', { month: 'short' });
                        let year = dateObj.getFullYear();
                        displayDate = `${day} ${month} <br><span class="text-[10px] text-slate-500 font-normal">${year}</span>`;
                    }

                    let cName = row.customerName || "N/A";
                    let emiAmt = Number(row.emiAmountPaid || 0);

                    html += `
                        <tr class="hover:bg-slate-900/40 transition border-b border-slate-800/60">
                            <td class="p-4 font-sans text-slate-400 font-semibold leading-relaxed">${displayDate}</td>
                            <td class="p-4 font-black text-white uppercase text-sm tracking-wide">${cName}</td>
                            <td class="p-4 font-mono font-black text-emerald-400 text-sm">₹${emiAmt.toLocaleString('en-IN')}</td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
                document.getElementById("lblRowsCounter").innerText = "Rows : " + rowCount;

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="3" class="p-6 text-center text-rose-500 font-bold">Error syncing data.</td></tr>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadEmiCollectionsLedger);
    </script>
</body>
</html>
