<!DOCTYPE html>
<html>
<head>
<title>EMI Collection</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:90px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0d2b6b;
color:white;
padding:12px;
}

table td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.btn{
padding:10px 15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>EMI Collection</h1>

<table>

<tr>
<th>Customer</th>
<th>EMI</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>Ramesh</td>
<td>₹5,000</td>
<td>Pending</td>
<td>
<button onclick="collectEMI()">
Collect EMI
</button>
</td>
</tr>

</table>

</div>

<script>

window.collectEMI = async function(){

let customer =
document.getElementById("customer").value;

let amount =
document.getElementById("amount").value;

await addDoc(collection(db,"emi_collections"),{

customer:customer,
amount:amount,
date:new Date()

});

alert("EMI Collected");

}

</script>

</body>
</html>
