<!DOCTYPE html>
<html>
<head>

<title>HBML EMI Collection</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f4f8;
padding:20px;
}

.box{
max-width:650px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.logo{
width:90px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:25px;
}

.card{
background:#f7f9fc;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.label{
color:#666;
font-size:14px;
}

.value{
font-size:22px;
font-weight:bold;
color:#0d2b6b;
margin-top:5px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#0d2b6b;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#163c91;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>EMI Collection</h1>

<div class="card">
<div class="label">Customer Name</div>
<div class="value" id="customerName">Loading...</div>
</div>

<div class="card">
<div class="label">Monthly EMI</div>
<div class="value" id="customerEMI">₹0</div>
</div>

<div class="card">
<div class="label">Outstanding Balance</div>
<div class="value" id="customerBalance">₹0</div>
</div>

<label>Amount</label>

<input
type="number"
id="amount">

<label>Payment Mode</label>

<select id="mode">

<option>Cash</option>
<option>PhonePe</option>
<option>Google Pay</option>
<option>Bank Transfer</option>

</select>
  <button id="collectBtn">
Collect EMI
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
addDoc,
collection
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",

authDomain:"hbml-capital.firebaseapp.com",

projectId:"hbml-capital",

storageBucket:"hbml-capital.firebasestorage.app",

messagingSenderId:"893969951538",

appId:"1:893969951538:web:ba028463a6adcfb417c52b"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);

const customerId=params.get("id");

if(!customerId){

alert("Customer ID Missing");

window.location="view-customers.html";

}

const customerRef=doc(db,"customers",customerId);

const snap=await getDoc(customerRef);

if(!snap.exists()){

alert("Customer Not Found");

window.location="view-customers.html";

}

const customer=snap.data();

document.getElementById("customerName").innerHTML=customer.name;

document.getElementById("customerEMI").innerHTML=
"₹"+Number(customer.emi).toLocaleString();

document.getElementById("customerBalance").innerHTML=
"₹"+Number(customer.balance||customer.loan).toLocaleString();

document.getElementById("amount").value=
customer.emi;
  
document.getElementById("collectBtn").onclick = async function(){

try{

const amount =
Number(document.getElementById("amount").value);

const mode =
document.getElementById("mode").value;

if(amount<=0){

alert("Enter valid amount");

return;

}

const paid =
Number(customer.paid || 0) + amount;

const balance =
Number(customer.loan) - paid;

/* SAVE PAYMENT */

await addDoc(

collection(db,"customers",customerId,"payments"),

{

amount:amount,

mode:mode,

date:new Date().toLocaleDateString("en-IN"),

created:new Date()

}

);

/* UPDATE CUSTOMER */

await updateDoc(customerRef,{

paid:paid,

balance:balance

});

alert("EMI Collected Successfully");

window.location.href =
"customer-details.html?id="+customerId;

}
catch(error){

alert(error.message);

}

};
  </script>

</body>
</html>
