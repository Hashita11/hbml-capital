<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Mobile App Configuration</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-6 flex flex-col items-center justify-center">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-5 md:p-6 shadow-2xl space-y-6">
        
        <div class="flex justify-between items-center">
            <a href="admin.html" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl transition">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            <span class="text-[10px] font-black uppercase bg-sky-500/10 text-sky-400 px-2.5 py-1 rounded-md border border-sky-500/20 shadow-xs tracking-wider">
                App Control Node
            </span>
        </div>

        <div class="text-center space-y-2 py-2">
            <div class="h-14 w-14 bg-slate-950 text-sky-400 rounded-xl flex items-center justify-center text-2xl font-black shadow-md border border-slate-800 mx-auto">
                <i class="fa-solid fa-mobile-screen-button animate-pulse"></i>
            </div>
            <h1 class="text-xl font-black tracking-tight uppercase">Mobile App Config</h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Manage Field Agent Mobile App Parameters</p>
        </div>

        <div class="space-y-4 text-left text-xs">
            
            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block">Live App Version (ప్రస్తుత యాప్ వెర్షన్)</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-slate-500"><i class="fa-solid fa-code-version"></i></span>
                    <input type="text" id="txtAppVersion" placeholder="e.g. 1.0.4" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 font-mono font-bold text-white focus:outline-hidden focus:border-sky-500 transition">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block">Force Update (తప్పనిసరి అప్‌డేట్)</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-slate-500"><i class="fa-solid fa-circle-exclamation"></i></span>
                    <select id="ddlForceUpdate" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 font-bold focus:outline-hidden text-slate-300 appearance-none cursor-pointer">
                        <option value="false">No (ఆప్షనల్ అప్‌డేట్)</option>
                        <option value="true">Yes (తప్పనిసరిగా అప్‌డేట్ చేయాలి)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block">Agent GPS Sync Interval (సెకన్లు)</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-slate-500"><i class="fa-solid fa-stopwatch"></i></span>
                    <input type="number" id="txtSyncInterval" placeholder="e.g. 300 (5 Minutes)" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 font-mono font-bold text-white focus:outline-hidden focus:border-sky-500 transition">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block">System Status (యాప్ సర్వర్ స్టేటస్)</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-slate-500"><i class="fa-solid fa-server"></i></span>
                    <select id="ddlSystemStatus" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 font-bold focus:outline-hidden text-slate-300 appearance-none cursor-pointer">
                        <option value="Active">Active (రన్నింగ్ లో ఉంది)</option>
                        <option value="Maintenance">Under Maintenance (నిర్వహణలో ఉంది)</option>
                    </select>
                </div>
            </div>

        </div>

        <button onclick="pushAppConfigToCloud()" id="btnPush" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-md tracking-wider text-xs uppercase flex items-center justify-center gap-2 cursor-pointer active:scale-98">
            <i class="fa-solid fa-satellite-dish" id="pushIcon"></i> Push App Configuration
        </button>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const appConfigRef = doc(db, "system_config", "mobile_app_settings");

        /* 🔄 క్లౌడ్ నుండి కరెంట్ యాప్ సెట్టింగ్స్ లాగడం */
        async function loadMobileAppConfiguration() {
            try {
                const snap = await getDoc(appConfigRef);
                if(snap.exists()) {
                    const data = snap.data();
                    document.getElementById("txtAppVersion").value = data.appVersion || "1.0.0";
                    document.getElementById("ddlForceUpdate").value = String(data.forceUpdate || "false");
                    document.getElementById("txtSyncInterval").value = data.gpsSyncInterval || "300";
                    document.getElementById("ddlSystemStatus").value = data.systemStatus || "Active";
                } else {
                    // డీఫాల్ట్ వాల్యూస్ నింపడం
                    document.getElementById("txtAppVersion").value = "1.0.0";
                    document.getElementById("ddlForceUpdate").value = "false";
                    document.getElementById("txtSyncInterval").value = "300";
                    document.getElementById("ddlSystemStatus").value = "Active";
                }
            } catch (error) {
                console.error("Config Node Read Timeout: ", error);
            }
        }

        /* 💾 కొత్త కాన్ఫిგరేషన్ ని క్లౌడ్ కి పుష్ చేయడం */
        window.pushAppConfigToCloud = async function() {
            let version = document.getElementById("txtAppVersion").value.trim();
            let forceUpdate = document.getElementById("ddlForceUpdate").value === "true";
            let interval = Number(document.getElementById("txtSyncInterval").value.trim());
            let status = document.getElementById("ddlSystemStatus").value;

            if(!version || !interval) {
                alert("Please fill all configuration nodes before deployment.");
                return;
            }

            const btn = document.getElementById("btnPush");
            const icon = document.getElementById("pushIcon");
            btn.disabled = true;
            btn.classList.add("opacity-50");
            icon.className = "fa-solid fa-spinner animate-spin";

            try {
                await setDoc(appConfigRef, {
                    appVersion: version,
                    forceUpdate: forceUpdate,
                    gpsSyncInterval: interval,
                    systemStatus: status,
                    lastConfigured: new Date()
                });

                alert("Mobile App Live Configuration Pushed to Cloud Gate Successfully!");
            } catch (error) {
                alert("Cloud write error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.classList.remove("opacity-50");
                icon.className = "fa-solid fa-satellite-dish";
            }
        }

        window.addEventListener('DOMContentLoaded', loadMobileAppConfiguration);
    </script>
</body>
</html>
