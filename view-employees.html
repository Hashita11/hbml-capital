<!DOCTYPE html>
<html>

<head>

<title>View Employees</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f4f8;
padding:20px;
}

/* MAIN BOX */

.box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:1100px;
margin:auto;
}

/* LOGO */

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

/* TITLE */

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

/* SEARCH */

.search{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
margin-bottom:20px;
font-size:16px;
}

/* TABLE */

.table-box{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0d2b6b;
color:white;
padding:14px;
}

table td{
padding:14px;
border-bottom:1px solid #ddd;
text-align:center;
}

/* BUTTON */

.btn{
padding:10px 15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn:hover{
background:#163c91;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>HBML Employee Database</h1>

<input type="text"
class="search"
id="search"
placeholder="Search Employee..."
onkeyup="searchEmployee()">

<div class="table-box">

<table id="employeeTable">

<tr>

<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Role</th>

</tr>

</table>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",

authDomain: "hbml-capital.firebaseapp.com",

projectId: "hbml-capital",

storageBucket: "hbml-capital.firebasestorage.app",

messagingSenderId: "893969951538",

appId: "1:893969951538:web:ba028463a6adcfb417c52b"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* LOAD EMPLOYEES */

async function loadEmployees(){

const querySnapshot =
await getDocs(collection(db,"employees"));

const table =
document.getElementById("employeeTable");

querySnapshot.forEach((doc)=>{

const data = doc.data();

let row = table.insertRow();

row.insertCell(0).innerHTML =
data.name || "";

row.insertCell(1).innerHTML =
data.phone || "";

row.insertCell(2).innerHTML =
data.email || "";

row.insertCell(3).innerHTML =
data.role || "";

});

}

loadEmployees();

/* SEARCH */

window.searchEmployee = function(){

let input =
document.getElementById("search")
.value.toLowerCase();

let table =
document.getElementById("employeeTable");

let tr =
table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let td =
tr[i].getElementsByTagName("td")[0];

if(td){

let txt =
td.textContent || td.innerText;

tr[i].style.display =
txt.toLowerCase().indexOf(input)>-1
? ""
: "none";

}

}

}

</script>

</body>
</html>
