<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Customer Digital Profile Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-center items-center p-4">

    <div id="mainProfileCard" class="w-full max-w-md bg-white rounded-3xl p-6 md:p-8 shadow-[0_10px_40px_rgba(0,0,0,0.04)] border border-slate-100 text-center space-y-6 relative">
        
        <div class="space-y-1">
            <img src="logo.png" alt="HBML Capital Logo" class="h-14 w-auto mx-auto" onerror="this.style.display='none'; document.getElementById('fallback-logo').classList.remove('hidden')">
            <div id="fallback-logo" class="text-xs font-black tracking-widest text-slate-400 uppercase hidden">HBML CAPITAL</div>
            <p class="text-[9px] text-slate-400 uppercase font-bold tracking-widest">Trusted Financial Solutions</p>
        </div>

        <div class="pt-2">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Customer Profile</h1>
        </div>

        <div class="flex justify-center">
            <div id="avatarCircle" class="h-28 w-28 bg-[#0b2964] text-white rounded-full flex items-center justify-center text-4xl font-bold shadow-lg uppercase">
                -
            </div>
        </div>

        <div class="space-y-1">
            <h2 id="txtName" class="text-2xl font-black text-slate-900 uppercase tracking-tight">Loading Profile...</h2>
            <span class="inline-block bg-slate-100 text-slate-500 font-mono font-bold text-[10px] tracking-wider px-2.5 py-1 rounded-full uppercase" id="lblCustId">
                UID: Syncing...
            </span>
        </div>

        <div class="text-left divide-y divide-slate-100 text-sm font-medium pt-2">
            
            <div class="py-3.5 flex justify-between items-center">
                <span class="text-slate-500 font-bold"><i class="fa-solid fa-phone text-slate-400 mr-2 w-4"></i>Phone</span>
                <span id="txtPhone" class="text-slate-900 font-bold font-mono">---</span>
            </div>

            <div class="py-3.5 flex justify-between items-center">
                <span class="text-slate-500 font-bold"><i class="fa-solid fa-location-dot text-slate-400 mr-2 w-4"></i>Address</span>
                <span id="txtAddress" class="text-slate-900 font-bold">---</span>
            </div>

            <div class="py-3.5 flex justify-between items-center">
                <span class="text-slate-500 font-bold"><i class="fa-solid fa-wallet text-slate-400 mr-2 w-4"></i>Loan Amount</span>
                <span id="txtLoan" class="text-slate-900 font-black font-mono">₹0</span>
            </div>

            <div class="py-3.5 flex justify-between items-center">
                <span class="text-slate-500 font-bold"><i class="fa-solid fa-calendar-check text-slate-400 mr-2 w-4"></i>Monthly EMI</span>
                <span id="txtEmi" class="text-slate-900 font-black font-mono">₹0</span>
            </div>

            <div class="py-3.5 flex justify-between items-center">
                <span class="text-slate-500 font-bold"><i class="fa-solid fa-money-bill-1-wave text-slate-400 mr-2 w-4"></i>Paid Amount</span>
                <span id="txtPaid" class="text-emerald-600 font-black font-mono">₹0</span>
            </div>
            
            <div class="py-3.5 flex justify-between items-center">
                <span class="text-slate-500 font-bold"><i class="fa-solid fa-scale-unbalanced text-slate-400 mr-2 w-4"></i>Outstanding</span>
                <span id="txtBalance" class="text-amber-600 font-black font-mono">₹0</span>
            </div>

        </div>

        <div class="pt-4 flex gap-2 no-print">
            <button onclick="window.location.href='view-customers.html'" class="w-1/2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs py-3 px-4 rounded-xl transition cursor-pointer flex items-center justify-center gap-1.5 active:scale-95">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button onclick="window.print()" class="w-1/2 bg-[#0b2964] hover:bg-[#123985] text-white font-bold text-xs py-3 px-4 rounded-xl transition shadow-md cursor-pointer flex items-center justify-center gap-1.5 active:scale-95">
                <i class="fa-solid fa-print"></i> Print Profile
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 👑 🛠️ ఇక్కడ 'window' ఆబ్జెక్ట్‌కు నేరుగా బైండ్ చేయడం వల్ల బ్రౌజర్ ఏ స్పీడ్‌లో లోడ్ చేసినా సరే ఐడీ ఇన్‌స్టంట్‌గా క్యాచ్ అవుతుంది
        async function streamDigitalProfileCard() {
            try {
                const params = new URLSearchParams(window.location.search);
                const customerId = params.get("id");

                if(!customerId){
                    document.getElementById("mainProfileCard").innerHTML = `
                        <div class="p-4 text-center space-y-4">
                            <div class="h-12 w-12 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto text-xl"><i class="fa-solid fa-circle-exclamation"></i></div>
                            <h2 class="text-lg font-black text-slate-900">No Customer ID Found</h2>
                            <p class="text-xs text-slate-500 font-medium">దయచేసి Borrowers Directory నుండి ప్రొఫైల్ ఓపెన్ చేయండి.</p>
                            <a href="view-customers.html" class="inline-block bg-slate-900 text-white font-bold text-xs py-3 px-6 rounded-xl mt-2">Go to Directory</a>
                        </div>
                    `;
                    return;
                }

                const docRef = doc(db, "customers", customerId);
                const snap = await getDoc(docRef);

                if(!snap.exists()) {
                    document.getElementById("txtName").innerText = "Profile Not Found in Cloud";
                    return;
                }

                const data = snap.data();
                const cleanName = data.name || "HBML Customer";

                document.getElementById("txtName").innerText = cleanName;
                document.getElementById("avatarCircle").innerText = cleanName.charAt(0).toUpperCase();

                let displayUID = data.customerId || "HBML-" + customerId.substring(0, 5).toUpperCase();
                document.getElementById("lblCustId").innerText = "UID: " + displayUID;

                document.getElementById("txtPhone").innerText = data.phone || "N/A";
                document.getElementById("txtAddress").innerText = data.address || "Tanuku";

                let emiValue = Number(data.emi || 0);
                let tenure = 12; 
                if (data.tenureMonths !== undefined && Number(data.tenureMonths) > 0) {
                    tenure = Number(data.tenureMonths);
                } else if (data.months !== undefined && Number(data.months) > 0) {
                    tenure = Number(data.months);
                }

                let totalLoanWithInterest = emiValue * tenure;
                if (totalLoanWithInterest <= 0) {
                    totalLoanWithInterest = Number(data.loanPrincipal || data.loan || 0);
                }

                let totalPaidCalculated = 0;
                try {
                    const paymentSnap = await getDocs(collection(db, "customers", customerId, "payments"));
                    paymentSnap.forEach((pDoc) => {
                        totalPaidCalculated += Number(pDoc.data().amount || 0);
                    });
                } catch(e) { console.log("Payments subcollection empty"); }

                let finalPaid = totalPaidCalculated > 0 ? totalPaidCalculated : Number(data.paid || 0);
                let finalOutstanding = totalLoanWithInterest - finalPaid;
                if(finalOutstanding < 0) finalOutstanding = 0;

                document.getElementById("txtLoan").innerText = "₹" + totalLoanWithInterest.toLocaleString('en-IN');
                document.getElementById("txtEmi").innerText = "₹" + emiValue.toLocaleString('en-IN');
                document.getElementById("txtPaid").innerText = "₹" + finalPaid.toLocaleString('en-IN');
                document.getElementById("txtBalance").innerText = "₹" + Math.round(finalOutstanding).toLocaleString('en-IN');

            } catch (e) {
                console.error(e);
                document.getElementById("txtName").innerText = "Sync Error";
            }
        }

        // 👑 సేఫ్ ఎగ్జిక్యూషన్ లాక్
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", streamDigitalProfileCard);
        } else {
            streamDigitalProfileCard();
        }
    </script>
    
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            #mainProfileCard { box-shadow: none !important; border: none !important; }
        }
    </style>
</body>
</html>
