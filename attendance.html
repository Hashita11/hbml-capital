<!DOCTYPE html>
<html>
<head>
<title>Employee Attendance</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:700px;
margin:auto;
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0d2b6b;
color:white;
padding:12px;
}

table td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.btn{
padding:10px 15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>Employee Attendance</h1>

<table>

<tr>
<th>Employee</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>Ravi</td>
<td>30-05-2026</td>
<td>Present</td>
<td>
<button class="btn"
onclick="markAttendance()">
Update
</button>
</td>
</tr>

</table>

</div>

<script>

window.markAttendance = async function(){

let employee =
document.getElementById("employee").value;

await addDoc(collection(db,"attendance"),{

employee:employee,
date:new Date(),
status:"Present"

});

alert("Attendance Saved");

}

</script>

</body>
</html>
