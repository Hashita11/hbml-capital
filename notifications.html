<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Live Notifications Hub</title>
    <!-- Modern Tailwind CSS V4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-6 flex flex-col items-center justify-center py-10">

    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-3xl p-5 md:p-6 shadow-2xl space-y-6">
        
        <!-- TOP CONTROL NAVIGATION & ROLE SIMULATOR -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-3 border-b border-slate-800/60 pb-4">
            <a href="admin.html" class="w-full sm:w-auto flex items-center justify-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-950 border border-slate-800 px-3 py-2 rounded-xl transition uppercase">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            
            <div class="w-full sm:w-auto flex items-center gap-2">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-wider shrink-0">Current Role:</span>
                <select id="currentUserRole" onchange="switchNotificationRoleMode()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs font-bold text-sky-400 focus:outline-hidden cursor-pointer">
                    <option value="Admin">Admin (అన్ని అలర్ట్స్)</option>
                    <option value="Field Agent">Field Agent (సిబ్బంది అలర్ట్స్)</option>
                    <option value="Customer">Customer (ఖాతాదారుల అలర్ట్స్)</option>
                </select>
            </div>
        </div>

        <!-- BRANDING HEADER -->
        <div class="text-center space-y-2">
            <img src="logo.png" alt="HBML Logo" class="h-12 w-auto mx-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').classList.remove('hidden')">
            <div id="fallback-icon" class="h-12 w-12 bg-slate-950 text-sky-400 rounded-xl flex items-center justify-center text-xl font-black shadow-md border border-slate-800 mx-auto hidden">H</div>
            <h1 class="text-xl font-black tracking-tight uppercase text-white">HBML Notifications Hub</h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider" id="lblSubtitle">Loading Cloud Signals...</p>
        </div>

        <!-- 👑 📢 ADVANCED BROADCAST NEW ALERT FORM -->
        <div id="adminPublishPanel" class="bg-slate-950/50 border border-slate-800 rounded-2xl p-4 space-y-3 text-left">
            <h3 class="text-xs font-black uppercase text-amber-500 tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-bullhorn"></i> Broadcast New Alert (కొత్త అలర్ట్ పంపండి)
            </h3>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 text-xs">
                <!-- Target Segment Locked strictly for Agents and Customers -->
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase block mb-1">Target Audience</label>
                    <select id="newAlertRole" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 font-bold text-slate-300 focus:outline-hidden cursor-pointer">
                        <option value="all">All (అందరికీ)</option>
                        <option value="field agent">Field Agents Only</option>
                        <option value="customer">Customers Only</option>
                    </select>
                </div>
                
                <!-- 🏢 ADVANCED FEATURE: TARGET BRANCH ROUTING MODULE -->
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase block mb-1">Target Branch</label>
                    <select id="newAlertBranch" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 font-bold text-slate-300 focus:outline-hidden cursor-pointer">
                        <option value="all">All Branches (అన్నీ)</option>
                        <option value="tanuku">Tanuku HQ</option>
                        <option value="velpur">Velpur Branch</option>
                        <option value="undrajavaram">Undrajavaram</option>
                        <option value="relangi">Relangi Branch</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase block mb-1">Alert Type Icon</label>
                    <select id="newAlertType" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 font-bold text-slate-300 focus:outline-hidden cursor-pointer">
                        <option value="emi">EMI / Collection</option>
                        <option value="loan">Loan Status</option>
                        <option value="attendance">Attendance Check</option>
                        <option value="report">Management Report</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2 text-xs">
                <input type="text" id="newAlertTitle" placeholder="Alert Title (e.g., Collection Notice)" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-white focus:outline-hidden focus:border-sky-500">
                <textarea id="newAlertMsg" placeholder="Type notification details in English or Telugu..." rows="2" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-white focus:outline-hidden focus:border-sky-500 resize-none"></textarea>
            </div>
            
            <button onclick="publishAlertToCloud()" id="btnPublish" class="w-full bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold py-2.5 rounded-xl transition uppercase tracking-wide flex items-center justify-center gap-1.5 cursor-pointer">
                <i class="fa-solid fa-paper-plane" id="publishIcon"></i> Broadcast Notification
            </button>
        </div>

        <!-- 🔔 DYNAMIC NOTIFICATION STREAM CONTAINER -->
        <div class="space-y-3.5 text-left min-h-[200px]" id="notificationsContainer">
            <div class="text-center py-12 text-slate-500 text-xs font-bold font-mono animate-pulse">
                <i class="fa-solid fa-satellite-dish animate-spin text-sky-400 text-lg mr-2"></i> Connecting to Firebase database node...
            </div>
        </div>

    </div>

    <!-- FIREBASE AND ROLE FILTER LOGIC SYSTEM -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let globalFetchedNotifications = [];
        let isPublishGateLocked = false;

        const SEED_FALLBACK_ALERTS = [
            { title: "EMI Payment Due Tomorrow", msg: "కస్టమర్ల నెలవారీ ఈఎంఐ షెడ్యూల్ రేపటి తేదీతో యాక్టిവേట్ అవ్వడానికి సిద్ధంగా ఉంది.", role: "field agent", branch: "all", type: "emi", timestamp: new Date().getTime() },
            { title: "New Customer Loan Approved", msg: "కొత్త రుణగ్రహీత యొక్క కేవైసీ పత్రాల వెరిఫికేషన్ పూర్తయి ఖాతా మంజూరైంది.", role: "all", branch: "all", type: "loan", timestamp: new Date().getTime() - 3600000 },
            { title: "Velpur Branch Attendance", msg: "వేల్పూరు బ్రాంచ్ సిబ్బంది యొక్క నేటి హాజరు రికార్డులు అప్‌డేట్ చేయబడ్డాయి.", role: "field agent", branch: "velpur", type: "attendance", timestamp: new Date().getTime() - 7200000 },
            { title: "Your Loan EMI Received Successfully", msg: "మీ ఈనెల లోన్ ఈఎంఐ రికవరీ అమౌంట్ విజయవంతంగా జమైంది. థాంక్యూ!", role: "customer", branch: "all", type: "loan", timestamp: new Date().getTime() - 86400000 }
        ];

        async function fetchLiveCloudNotifications() {
            try {
                const snap = await getDocs(collection(db, "notifications"));
                globalFetchedNotifications = [];

                if(!snap.empty) {
                    snap.forEach(doc => {
                        globalFetchedNotifications.push(doc.data());
                    });
                    globalFetchedNotifications.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                } else {
                    globalFetchedNotifications = [...SEED_FALLBACK_ALERTS];
                }

                let currentRole = document.getElementById("currentUserRole").value;
                renderFilteredNotifications(currentRole);

            } catch (error) {
                console.error("Cloud Error:", error);
                globalFetchedNotifications = [...SEED_FALLBACK_ALERTS];
                renderFilteredNotifications("Admin");
            }
        }

        /* 👑 🧮 MASTER ROLE & BRANCH NETWORK FILTER FUNCTION */
        window.renderFilteredNotifications = function(selectedRole) {
            const container = document.getElementById("notificationsContainer");
            const subtitle = document.getElementById("lblSubtitle");
            const adminPanel = document.getElementById("adminPublishPanel");
            
            let currentRoleLower = selectedRole.toLowerCase();
            let html = "";
            let matchCount = 0;

            subtitle.innerText = `Viewing Log As: ${selectedRole} Mode`;

            if(currentRoleLower === "admin") {
                adminPanel.classList.remove("hidden");
            } else {
                adminPanel.classList.add("hidden");
            }

            globalFetchedNotifications.forEach(item => {
                let targetRole = (item.role || "all").toLowerCase();
                let targetBranch = (item.branch || "all").toLowerCase();
                
                let hasAccess = false;
                if (currentRoleLower === "admin") {
                    hasAccess = true; 
                } else if (currentRoleLower === "field agent" && targetRole === "field agent") {
                    hasAccess = true;
                } else if (currentRoleLower === "customer" && targetRole === "customer") {
                    hasAccess = true;
                } else if (targetRole === "all") {
                    hasAccess = true;
                }

                if(hasAccess) {
                    matchCount++;
                    
                    let borderStyle = "border-sky-500";
                    let iconStyle = "bg-sky-500/10 text-sky-400";
                    let iconClass = "fa-solid fa-bell";

                    if(item.type === "emi") {
                        borderStyle = "border-amber-500";
                        iconStyle = "bg-amber-500/10 text-amber-400";
                        iconClass = "fa-solid fa-calendar-clock";
                    } else if(item.type === "loan") {
                        borderStyle = "border-emerald-500";
                        iconStyle = "bg-emerald-500/10 text-emerald-400";
                        iconClass = "fa-solid fa-file-invoice-dollar";
                    } else if(item.type === "attendance") {
                        borderStyle = "border-sky-500";
                        iconStyle = "bg-sky-500/10 text-sky-400";
                        iconClass = "fa-solid fa-user-check";
                    } else if(item.type === "report") {
                        borderStyle = "border-purple-500";
                        iconStyle = "bg-purple-500/10 text-purple-400";
                        iconClass = "fa-solid fa-chart-pie";
                    }

                    let timeDisplay = "Recent Alert";
                    if(item.timestamp) {
                        let diff = new Date().getTime() - item.timestamp;
                        let mins = Math.floor(diff / 60000);
                        let hours = Math.floor(mins / 60);
                        if(mins < 1) timeDisplay = "Just now";
                        else if(mins < 60) timeDisplay = `${mins} mins ago`;
                        else if(hours < 24) timeDisplay = `${hours} hours ago`;
                        else timeDisplay = new Date(item.timestamp).toLocaleDateString('en-IN');
                    }

                    // 🏢 బ్రాంచ్ ట్యాగ్ బ్యాడ్జ్ డిస్‌ప్లే
                    let branchBadge = targetBranch !== "all" ? `<span class="bg-slate-800 text-amber-400 border border-slate-700 text-[8px] font-bold px-1.5 py-0.5 rounded uppercase font-sans">${targetBranch}</span>` : "";

                    html += `
                        <div class="bg-slate-950/60 p-4 rounded-xl border-l-4 ${borderStyle} border-y border-r border-slate-800/80 flex items-start gap-3.5 transition hover:border-slate-700">
                            <div class="p-2 ${iconStyle} rounded-lg text-sm mt-0.5 shrink-0">
                                <i class="${iconClass}"></i>
                            </div>
                            <div class="space-y-1 w-full">
                                <div class="flex justify-between items-center w-full">
                                    <div class="flex items-center gap-1.5">
                                        <h4 class="text-xs font-black text-white uppercase tracking-wide">${item.title}</h4>
                                        ${branchBadge}
                                    </div>
                                    <span class="text-[9px] font-mono font-bold text-slate-500"><i class="fa-regular fa-clock text-[8px]"></i> ${timeDisplay}</span>
                                </div>
                                <p class="text-[11px] text-slate-400 leading-relaxed font-medium">${item.msg || item.message}</p>
                            </div>
                        </div>
                    `;
                }
            });

            if(matchCount === 0) {
                html = `<div class="text-center py-12 text-slate-600 font-bold text-xs"><i class="fa-solid fa-bell-slash mr-1"></i> No active alerts found for this segment.</div>`;
            }

            container.innerHTML = html;
        }

        /* 💾 WRITE NEW RECORD WITH BRANCH OPERATION CONTROL */
        window.publishAlertToCloud = async function() {
            if (isPublishGateLocked) return;

            let targetRole = document.getElementById("newAlertRole").value;
            let targetBranch = document.getElementById("newAlertBranch").value;
            let alertType = document.getElementById("newAlertType").value;
            let title = document.getElementById("newAlertTitle").value.trim();
            let message = document.getElementById("newAlertMsg").value.trim();

            if(!title || !message) {
                alert("Please fill in all input fields.");
                return;
            }

            const btn = document.getElementById("btnPublish");
            const icon = document.getElementById("publishIcon");

            isPublishGateLocked = true;
            btn.disabled = true;
            btn.classList.add("opacity-50");
            icon.className = "fa-solid fa-spinner animate-spin";

            try {
                await addDoc(collection(db, "notifications"), {
                    title: title,
                    msg: message,
                    role: targetRole,
                    branch: targetBranch, // 🏢 Save targeted branch info
                    type: alertType,
                    timestamp: new Date().getTime()
                });

                alert(`Broadcast successfully deployed!`);
                
                document.getElementById("newAlertTitle").value = "";
                document.getElementById("newAlertMsg").value = "";

                fetchLiveCloudNotifications(); 

            } catch (error) {
                alert("Broadcast failure: " + error.message);
            } finally {
                isPublishGateLocked = false;
                btn.disabled = false;
                btn.classList.remove("opacity-50");
                icon.className = "fa-solid fa-paper-plane";
            }
        }

        window.switchNotificationRoleMode = function() {
            let role = document.getElementById("currentUserRole").value;
            renderFilteredNotifications(role);
        }

        window.addEventListener('DOMContentLoaded', fetchLiveCloudNotifications);
    </script>
</body>
</html>
