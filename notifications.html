<!DOCTYPE html>
<html>
<head>

<title>Notifications</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:700px;
margin:auto;
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

.notification{
padding:15px;
background:#f7f9fc;
border-left:5px solid #0d2b6b;
margin-bottom:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>HBML Notifications</h1>

<div class="notification">
EMI Payment Due Tomorrow
</div>

<div class="notification">
New Customer Loan Approved
</div>

<div class="notification">
Employee Attendance Updated
</div>

<div class="notification">
Monthly Report Generated
</div>

</div>

</body>
</html>
