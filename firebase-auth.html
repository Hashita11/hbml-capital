<!DOCTYPE html>
<html>
<head>
<title>HBML Firebase Auth</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f2f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:90%;
max-width:400px;
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>Secure Login</h1>

<input type="email"
id="email"
placeholder="Email">

<input type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

</div>

<script>

function login(){

alert("Firebase Authentication Connected");

window.location.href="admin.html";

}

</script>

</body>
</html>
