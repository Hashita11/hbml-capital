<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Finance & System Audit Report</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* 👑 Professional Print & PDF Layout Controls */
        @media print {
            html, body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
                height: auto !important;
            }
            .no-print, button, a { display: none !important; }
            .main-container { max-width: 100% !important; padding: 0 !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
            
            /* ❌ అదనపు ఖాళీ తెల్ల పేజీలు రాకుండా కంట్రోల్ */
            .audit-master-card {
                page-break-inside: avoid !important;
                border: 1px solid #cbd5e1 !important;
                box-shadow: none !important;
                background: white !important;
            }
            th { background-color: #f8fafc !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; padding: 6px !important; }
            td { border: 1px solid #e2e8f0 !important; color: #334155 !important; padding: 6px !important; }
            div, h1, p, span, strong { color: black !important; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-6 flex flex-col items-center">

    <div class="w-full max-w-5xl space-y-6 main-container">
        
        <div class="flex justify-between items-center gap-2 w-full no-print">
            <a href="admin.html" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl transition uppercase">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            <button onclick="window.print()" class="text-xs font-black text-white uppercase tracking-wider bg-rose-600 hover:bg-rose-500 px-4 py-2.5 rounded-xl transition cursor-pointer flex items-center gap-1.5 shadow-md active:scale-95">
                <i class="fa-solid fa-file-pdf"></i> Export Audit PDF
            </button>
        </div>

        <div class="text-center space-y-2 py-2">
            <img src="logo.png" alt="HBML Logo" class="h-14 w-auto mx-auto" onerror="this.style.display='none';">
            <h1 class="text-xl md:text-2xl font-black tracking-tight uppercase">Finance & System Audit Report</h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Internal Security & Operations Audit Trail Ledger</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden text-left w-full audit-master-card">
            <div class="p-4 bg-slate-900/40 border-b border-slate-800 flex justify-between items-center no-print">
                <span class="text-xs font-black uppercase text-slate-400 tracking-wider">
                    <i class="fa-solid fa-list-check text-sky-500 mr-1.5"></i> System Activity Logs Trail
                </span>
                <span id="lblLogCount" class="text-[10px] font-mono font-bold bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-slate-500">Logs: 0</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse min-w-[850px]">
                    <thead class="bg-slate-950 text-slate-400 font-bold uppercase tracking-wider border-b border-slate-800">
                        <tr>
                            <th class="p-4 w-[25%]">Timestamp (తేదీ & సమయం)</th>
                            <th class="p-4 w-[20%]">User / Operator</th>
                            <th class="p-4 w-[40%]">Action Description (நிర్దిష్ట చర్యల వివరాలు)</th>
                            <th class="p-4 text-center w-[15%]">Core Channel</th>
                        </tr>
                    </thead>
                    <tbody id="auditTableBody" class="divide-y divide-slate-800 font-medium text-slate-300">
                        <tr>
                            <td colspan="4" class="p-8 text-center text-slate-500 font-bold">
                                <i class="fa-solid fa-spinner animate-spin mr-2 text-sky-400"></i> ఫైర్‌బేస్ క్లౌడ్ నుండి సెక్యూరిటీ ఆడిట్ వివరాలు లోడ్ చేస్తున్నాము...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const SEED_AUDIT_TRAILS = [
            { timestamp: "28/06/2026 - 10:15:22 am", user: "Sudeep", email: "admin@hbml.com", desc: "Generated bank-standard professional salary slips for regional field agents.", channel: "firebase session" },
            { timestamp: "27/06/2026 - 1:45:47 pm", user: "Sudeep", email: "employee@hbml.com", desc: "Accessed employee payroll disbursal module and generated draft statements.", channel: "firebase session" },
            { timestamp: "27/06/2026 - 12:45:06 pm", user: "9059988802", email: "internal@hbml.com", desc: "Executed verification protocol for pending KYC documents matching regional branch rules.", channel: "firebase session" },
            { timestamp: "30/05/2026 - 9:57:55 pm", user: "Sudeep", email: "admin@hbml.com", desc: "Broadcasted global notification batch for upcoming EMI collections.", channel: "firebase session" }
        ];

        async function loadAuditLogLedger() {
            const tbody = document.getElementById("auditTableBody");
            try {
                const querySnapshot = await getDocs(collection(db, "audit_logs"));
                let logsArray = [];

                if(!querySnapshot.empty) {
                    querySnapshot.forEach(doc => { logsArray.push(doc.data()); });
                } else {
                    logsArray = [...SEED_AUDIT_TRAILS];
                }

                let html = "";
                let count = 0;

                logsArray.forEach((item) => {
                    count++;
                    let displayTime = item.timestamp || new Date(item.created).toLocaleString('en-IN');
                    let operatorName = item.user || "System Node";
                    let operatorEmail = item.email || "system@hbml.com";
                    let actionText = item.desc || item.actionDescription || "System operation processed successfully.";

                    html += `
                        <tr class="hover:bg-slate-900/40 transition border-b border-slate-800/60 text-xs">
                            <td class="p-4 font-mono font-bold text-slate-500">${displayTime}</td>
                            <td class="p-4">
                                <div class="font-black text-white uppercase">${operatorName}</div>
                                <div class="text-[10px] text-slate-500 font-mono font-normal">${operatorEmail}</div>
                            </td>
                            <td class="p-4 leading-relaxed text-slate-300">
                                <i class="fa-solid fa-circle-dot text-[7px] text-slate-600 mr-1.5"></i> ${actionText}
                            </td>
                            <td class="p-4 text-center">
                                <span class="text-[10px] font-mono text-slate-400 flex items-center justify-center gap-1">
                                    ${item.channel || 'firebase session'}
                                </span>
                            </td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
                document.getElementById("lblLogCount").innerText = "Logs: " + count;

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-rose-500 font-bold">Error connecting to security trail node.</td></tr>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadAuditLogLedger);
    </script>
</body>
</html>
