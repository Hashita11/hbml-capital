<!DOCTYPE html>
<html>
<head>
<title>Loan Reports</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:90px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
color:#0d2b6b;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>Loan Reports</h1>

<div class="cards">

<div class="card">
<h2>₹5,80,000</h2>
<p>Total Collection</p>
</div>

<div class="card">
<h2>150</h2>
<p>Total Customers</p>
</div>

<div class="card">
<h2>18</h2>
<p>Pending Loans</p>
</div>

</div>

</div>

</body>
</html>
