<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HBML CAPITAL LOGIN</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:15px;
}

h1{
    color:#0d2b6b;
    margin-bottom:5px;
    font-size:42px;
}

.sub{
    color:#777;
    margin-bottom:25px;
    font-size:16px;
}

.tabs{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom:25px;
}

.tabs button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#ececec;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

.tabs button.active{
    background:#0d2b6b;
    color:white;
}

input{
    width:100%;
    padding:16px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#0d2b6b;
}

.login-btn{
    width:100%;
    padding:16px;
    background:#0d2b6b;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#163c91;
}

.message{
    margin-top:15px;
    color:green;
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <h1>HBML CAPITAL</h1>

    <div class="sub">
        Trusted Financial Solutions
    </div>

    <!-- ROLE BUTTONS -->
    <div class="tabs">

        <button class="active"
        onclick="setRole('Admin',this)">
        Admin
        </button>

        <button
        onclick="setRole('Employee',this)">
        Employee
        </button>

        <button
        onclick="setRole('Customer',this)">
        Customer
        </button>

    </div>

    <!-- FORM -->

    <input
    type="text"
    id="name"
    placeholder="Enter Name">

    <input
    type="email"
    id="email"
    placeholder="Enter Email">

    <input
    type="password"
    id="password"
    placeholder="Enter Password">

    <button class="login-btn"
    onclick="loginUser()">
    LOGIN
    </button>

    <div class="message" id="message"></div>

</div>

<!-- FIREBASE -->

<script type="module">

/* FIREBASE IMPORTS */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",

  authDomain: "hbml-capital.firebaseapp.com",

  projectId: "hbml-capital",

  storageBucket: "hbml-capital.firebasestorage.app",

  messagingSenderId: "893969951538",

  appId: "1:893969951538:web:ba028463a6adcfb417c52b"

};

/* INITIALIZE */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ROLE */

let role = "Admin";

/* ROLE BUTTON FUNCTION */

window.setRole = function(selectedRole,btn){

    role = selectedRole;

    document
    .querySelectorAll(".tabs button")
    .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}

/* LOGIN FUNCTION */

window.loginUser = async function(){

    let name =
    document.getElementById("name").value;

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    /* VALIDATION */

    if(name==="" || email==="" || password===""){

        alert("Please fill all fields");

        return;
    }

    try{

        /* SAVE TO FIREBASE */

        await addDoc(
            collection(db,"hbml_logins"),
            {
                name:name,
                email:email,
                password:password,
                role:role,
                loginTime:new Date()
            }
        );

        /* SUCCESS */

        document.getElementById("message")
        .innerHTML =
        role + " Login Successful";

        /* REDIRECT */

        if(role==="Admin"){

            window.location.href =
            "admin.html";

        }

        else if(role==="Employee"){

            window.location.href =
            "employee.html";

        }

        else{

            window.location.href =
            "customer.html";

        }

    }

    catch(error){

        alert(error);

    }

}

</script>

</body>
</html>
