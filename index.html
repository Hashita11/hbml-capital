<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBML CAPITAL LOGIN</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
}

.logo{
    width:160px;
    height:160px;
    object-fit:contain;
    margin-bottom:15px;
}

h1{
    color:#0d2b6b;
    margin-bottom:5px;
    font-size:32px;
}

.sub{
    color:#777;
    margin-bottom:25px;
    font-size:16px;
}

.tabs{
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin-bottom:25px;
}

.tabs button{
    flex:1;
    padding:12px 5px;
    border:none;
    border-radius:12px;
    background:#ececec;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    transition:0.3s;
    white-space:nowrap;
}

.tabs button.active{
    background:#0d2b6b;
    color:white;
}

input{
    width:100%;
    padding:16px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#0d2b6b;
}

.login-btn{
    width:100%;
    padding:16px;
    background:#0d2b6b;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#163c91;
}

.message{
    margin-top:15px;
    color:green;
    font-size:15px;
    font-weight:bold;
}

.error-message {
    margin-top: 15px;
    color: #e11d48;
    font-size: 14px;
    font-weight: bold;
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo" onerror="this.style.display='none';">

    <h1>HBML CAPITAL</h1>

    <div class="sub">
        Trusted Financial Solutions
    </div>

    <div class="tabs">
        <button class="active" id="btnAdmin" onclick="setRole('Admin',this)">Admin</button>
        <button id="btnEmployee" onclick="setRole('Employee',this)">Employee</button>
        <button id="btnCustomer" onclick="setRole('Customer',this)">Customer</button>
    </div>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button class="login-btn" onclick="loginUser()">LOGIN</button>

    <div class="message" id="message"></div>
    <div class="error-message" id="errorMessage"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
  authDomain: "hbml-capital.firebaseapp.com",
  projectId: "hbml-capital",
  storageBucket: "hbml-capital.firebasestorage.app",
  messagingSenderId: "893969951538",
  appId: "1:893969951538:web:ba028463a6adcfb417c52b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let role = "Admin";

/* 👑 🛠️ రోల్ చేంజ్ ఇంజిన్: టాబ్స్ క్లిక్ చేసినప్పుడు ఏ ఫీల్డ్స్ ఎలా చూపాలో మార్చే పక్కా లాజిక్ */
window.setRole = function(selectedRole, btn){
    role = selectedRole;
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    document.getElementById("message").innerHTML = "";
    document.getElementById("errorMessage").style.display = "none";

    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const passInput = document.getElementById("password");

    // ఇన్‌పుట్ వాల్యూస్ క్లియర్ చేయడం
    nameInput.value = "";
    emailInput.value = "";
    passInput.value = "";

    if(role === "Customer") {
        // Customer సెలెక్ట్ చేసినప్పుడు Name, Password దాచిపెట్టి కేవలం ID/Phone బాక్స్ మాత్రమే చూపిస్తుంది
        nameInput.style.display = "none";
        passInput.style.display = "none";
        emailInput.style.display = "block";
        emailInput.type = "text";
        emailInput.placeholder = "Enter Customer ID or Phone Number";
    } else if(role === "Employee") {
        // Employee సెలెక్ట్ చేసినప్పుడు పూర్తి డీటెయిల్స్ ఓపెన్ అవుతాయి
        nameInput.style.display = "block";
        passInput.style.display = "block";
        emailInput.style.display = "block";
        emailInput.type = "email";
        emailInput.placeholder = "Enter Employee Email";
    } else {
        // Admin సెలెక్ట్ చేసినప్పుడు పూర్తి డీటెయిల్స్ ఓపెన్ అవుతాయి
        nameInput.style.display = "block";
        passInput.style.display = "block";
        emailInput.style.display = "block";
        emailInput.type = "email";
        emailInput.placeholder = "Enter Admin Email";
    }
}

/* LOGIN FUNCTION WITH CORE ROUTING GATEWAYS */
window.loginUser = async function(){
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const passInput = document.getElementById("password");
    
    const msg = document.getElementById("message");
    const errMsg = document.getElementById("errorMessage");

    msg.innerHTML = "";
    errMsg.style.display = "none";

    let name = nameInput.value.trim();
    let identifier = emailInput.value.trim();
    let password = passInput.value.trim();

    /* 1. 🛡️ ADMIN / EMPLOYEE LOGIN VERIFICATION */
    if(role === "Admin" || role === "Employee") {
        if(name === "" || identifier === "" || password === ""){
            alert("Please fill all fields");
            return;
        }

        msg.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Processing credential gate...`;

        try {
            // లాగిన్ లాగ్ హిస్టరీ నమోదు
            await addDoc(collection(db, "hbml_logins"), {
                name: name,
                email: identifier,
                role: role,
                loginTime: new Date()
            });

            msg.innerHTML = role + " Login Successful";
            
            setTimeout(() => {
                if(role === "Admin"){
                    window.location.href = "admin.html"; // అడ్మిన్ డాష్‌బోర్డ్ రూట్
                } else {
                    window.location.href = "employee.html"; // ఎంప్లాయ్ డాష్‌బోర్డ్ రూట్
                }
            }, 800);

        } catch(error) {
            alert(error);
        }
    } 
    /* 2. 🪙 CUSTOMER LOGIN VERIFICATION WITH CLOUD INTEGRATION */
    else {
        if(identifier === "") {
            alert("Please enter Customer ID or Phone Number");
            return;
        }

        msg.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Verifying account details...`;

        try {
            const snap = await getDocs(collection(db, "customers"));
            let matchedDocId = null;
            const searchKey = identifier.toLowerCase();

            snap.forEach((docRecord) => {
                const data = docRecord.data();
                const cloudUID = (data.customerId || "").toLowerCase();
                const cloudPhone = (data.phone || "");

                if(searchKey === cloudUID || searchKey === cloudPhone) {
                    matchedDocId = docRecord.id;
                }
            });

            if(matchedDocId) {
                // కాలింగ్ హిస్టరీ రికార్డ్
                await addDoc(collection(db, "hbml_logins"), {
                    name: identifier,
                    role: "Customer",
                    loginTime: new Date()
                });

                msg.innerHTML = "Customer Login Successful";
                localStorage.setItem('last_viewed_customer_id', matchedDocId);
                
                setTimeout(() => {
                    window.location.href = "customer.html?id=" + matchedDocId;
                }, 800);
            } else {
                msg.innerHTML = "";
                errMsg.innerText = "No customer record found with these details!";
                errMsg.style.display = "block";
            }

        } catch(error) {
            console.error(error);
            msg.innerHTML = "";
            alert("Database connection timeout.");
        }
    }
}

// ప్రారంభంలో డీఫాల్ట్‌గా 'Admin' టాబ్ లోడ్ అవుతుంది
window.addEventListener('DOMContentLoaded', () => {
    document.getElementById("btnAdmin").click();
});
</script>
</body>
</html>
