<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - WhatsApp EMI Reminder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-6 flex flex-col items-center justify-center">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-5 md:p-6 shadow-2xl space-y-6">
        
        <div class="flex justify-between items-center">
            <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl transition">
                <i class="fa-solid fa-arrow-left"></i> వెనుకకు వెళ్ళు
            </a>
            <span class="text-[10px] font-black uppercase bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-md border border-emerald-500/20 shadow-xs tracking-wider">
                WhatsApp Engine
            </span>
        </div>

        <div class="text-center space-y-2 py-2">
            <img src="logo.png" alt="HBML Logo" class="h-14 w-auto mx-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').classList.remove('hidden')">
            <div id="fallback-icon" class="h-14 w-14 bg-slate-900 text-emerald-400 rounded-xl flex items-center justify-center text-2xl font-black shadow-md border border-slate-800 hidden mx-auto">H</div>
            <h1 class="text-xl font-black tracking-tight uppercase">WhatsApp Reminder</h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Dispatch Automated Digital Recovery Notices</p>
        </div>

        <div class="bg-slate-950/40 border border-slate-800 rounded-2xl p-4 text-xs space-y-2 text-left font-medium">
            <div class="flex justify-between">
                <span class="text-slate-500">Target Borrower:</span>
                <strong id="lblTargetName" class="text-white uppercase">Loading Borrower...</strong>
            </div>
            <div class="flex justify-between">
                <span class="text-slate-500">Mobile Number:</span>
                <strong id="lblTargetPhone" class="text-slate-300 font-mono">—</strong>
            </div>
        </div>

        <div class="space-y-1.5 text-left text-xs">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block">Compiled Message Body (మార్చుకోవచ్చు)</label>
            <textarea id="txtMessageArea" class="w-full h-44 bg-slate-950 border border-slate-800 rounded-xl p-4 font-medium text-slate-200 focus:outline-hidden focus:border-emerald-500 transition leading-relaxed">Loading template payload...</textarea>
        </div>

        <button onclick="dispatchWhatsAppNotice()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 px-4 rounded-xl transition shadow-md tracking-wider text-xs uppercase flex items-center justify-center gap-2 cursor-pointer active:scale-98">
            <i class="fa-brands fa-whatsapp text-lg"></i> Send Secure WhatsApp Notice
        </button>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let targetPhoneNumber = "";

        async function initWhatsAppPayload() {
            try {
                const params = new URLSearchParams(window.location.search);
                let customerDocId = params.get("id");

                if(!customerDocId) {
                    customerDocId = localStorage.getItem("last_viewed_customer_id");
                }

                if(!customerDocId) {
                    document.getElementById("txtMessageArea").value = "Error: No customer reference token provided.";
                    return;
                }

                // క్లౌడ్ నుండి కస్టమర్ వివరాలు మరియు బాకీలు లోడ్ చేయడం
                const docRef = doc(db, "customers", customerDocId);
                const snap = await getDoc(docRef);

                if(!snap.exists()) {
                    alert("Borrower profile not found.");
                    return;
                }

                const data = snap.data();
                
                let name = data.name || "Customer";
                targetPhoneNumber = data.phone || "";
                let emiValue = Number(data.emi || 0);
                let currentBalance = Number(data.balance !== undefined ? data.balance : (data.loanPrincipal || 0));
                let overdueDays = Number(data.overdueDays || data.lateDaysCount || 0);
                let displayUID = data.customerId || "HBML-" + customerDocId.substring(0,5).toUpperCase();

                document.getElementById("lblTargetName").innerText = name;
                document.getElementById("lblTargetPhone").innerText = targetPhoneNumber ? "+91 " + targetPhoneNumber : "Not Set";

                // 👑 🧮 మీ కంపెనీ పేరుతో కూడిన ప్రొఫెషనల్ తెలుగు/ఇంగ్లీష్ మెసేజ్ టెంప్లేట్ జనరేషన్
                let compiledMessage = `Dear ${name.toUpperCase()} (${displayUID}),\n\n`;
                compiledMessage += `Your monthly EMI payment of *₹${emiValue.toLocaleString('en-IN')}* is overdue.`;
                
                if(overdueDays > 0) {
                    compiledMessage += ` Your account is currently overdue by *${overdueDays} Days*.`;
                }
                
                compiledMessage += `\n\nPlease clear your outstanding balance immediately to avoid additional late penalties and impact on your CIBIL profile.\n\n`;
                compiledMessage += `*Outstanding Principal:* ₹${Math.round(currentBalance).toLocaleString('en-IN')}\n\n`;
                compiledMessage += `Regards,\n*HBML CAPITAL*`;

                document.getElementById("txtMessageArea").value = compiledMessage;

            } catch (error) {
                console.error(error);
                document.getElementById("txtMessageArea").value = "Sync Node Timeout.";
            }
        }

        /* 🚀 వాట్సాప్ యాప్ లోపలికి టెక్స్ట్ పంపించే ఫంక్షన్ */
        window.dispatchWhatsAppNotice = function() {
            if(!targetPhoneNumber) {
                alert("Cannot dispatch notice: Customer phone number is missing or incorrect.");
                return;
            }

            let msgPayload = document.getElementById("txtMessageArea").value;
            
            // యుఆర్ఎల్ కు అనుకూలంగా టెక్స్ట్ మార్చడం
            let encodedText = encodeURIComponent(msgPayload);
            
            // 📱 మొబైల్ వాట్సాప్ గేట్‌వే ఏపీఐ లింక్ కనెక్షన్
            let whatsappUrl = `https://api.whatsapp.com/send?phone=91${targetPhoneNumber}&text=${encodedText}`;
            
            // కొత్త టాబ్ లో వాట్సాప్ ఓపెన్ చేయడం
            window.open(whatsappUrl, '_blank');
        }

        window.addEventListener('DOMContentLoaded', initWhatsAppPayload);
    </script>
</body>
</html>
