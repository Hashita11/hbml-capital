<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collect EMI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f4f8;
padding:20px;
}

.box{
max-width:700px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.logo{
width:90px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:25px;
}

.card{
background:#f5f7fb;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.card h3{
color:#666;
font-size:15px;
margin-bottom:5px;
}

.card h2{
color:#0d2b6b;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
margin-top:15px;
}

button{
width:100%;
padding:15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#163c91;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>Collect EMI</h1>

<div class="card">
<h3>Customer Name</h3>
<h2 id="name">Loading...</h2>
</div>

<div class="card">
<h3>Loan Amount</h3>
<h2 id="loan">₹0</h2>
</div>

<div class="card">
<h3>Monthly EMI</h3>
<h2 id="emi">₹0</h2>
</div>

<div class="card">
<h3>Balance</h3>
<h2 id="balance">₹0</h2>
</div>

<input
type="number"
id="amount"
placeholder="Enter EMI Amount">

<button onclick="collectEMI()">
Collect EMI
</button>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
collection,
addDoc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",

authDomain:"hbml-capital.firebaseapp.com",

projectId:"hbml-capital",

storageBucket:"hbml-capital.firebasestorage.app",

messagingSenderId:"893969951538",

appId:"1:893969951538:web:ba028463a6adcfb417c52b"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* GET CUSTOMER ID */

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

let customer = {};

/* LOAD CUSTOMER */

async function loadCustomer(){

if(!id){

alert("Customer ID Missing");

return;

}

const ref = doc(db,"customers",id);

const snap = await getDoc(ref);

if(!snap.exists()){

alert("Customer Not Found");

return;

}

customer = snap.data();

document.getElementById("name").innerHTML =
customer.name;

document.getElementById("loan").innerHTML =
"₹"+Number(customer.loan).toLocaleString();

document.getElementById("emi").innerHTML =
"₹"+Number(customer.emi).toLocaleString();

let paid =
Number(customer.paid || 0);

let balance =
Number(customer.loan)-paid;

document.getElementById("balance").innerHTML =
"₹"+balance.toLocaleString();

}

loadCustomer();
  /* COLLECT EMI */

window.collectEMI = async function(){

try{

let amount =
Number(document.getElementById("amount").value);

if(amount<=0){

alert("Enter EMI Amount");

return;

}

let paid =
Number(customer.paid || 0);

paid += amount;

let balance =
Number(customer.loan) - paid;

/* SAVE PAYMENT */

await addDoc(collection(db,"emi_collections"),{

customerId:id,

customerName:customer.name,

amount:amount,

date:new Date()

});

/* UPDATE CUSTOMER */

await updateDoc(doc(db,"customers",id),{

paid:paid,

balance:balance

});

/* UPDATE SCREEN */

document.getElementById("balance").innerHTML =
"₹"+balance.toLocaleString();

document.getElementById("amount").value="";

alert("EMI Collected Successfully");

}
catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
