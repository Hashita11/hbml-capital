<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Collect EMI Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col justify-center items-center p-4" id="body-root">

    <div class="w-full max-w-xl mb-4 flex justify-between items-center">
        <a href="admin.html" class="inline-flex items-center gap-2 text-xs font-bold text-slate-600 hover:text-slate-900 bg-white border border-slate-200 px-3 py-2 rounded-xl shadow-xs transition">
            <i class="fa-solid fa-arrow-left"></i> Dashboard కి తిరిగి వెళ్ళు
        </a>
    </div>

    <div class="w-full max-w-xl bg-white rounded-2xl p-6 md:p-8 shadow-xl border border-slate-200/60 text-center space-y-5">
        
        <div>
            <div class="flex justify-center mb-3">
                <img src="logo.png" alt="HBML Logo" class="h-16 w-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').classList.remove('hidden')">
                <div id="fallback-icon" class="h-16 w-16 bg-slate-900 text-sky-400 rounded-xl flex items-center justify-center text-2xl font-black shadow-md border border-slate-800 hidden">H</div>
            </div>
            <h1 class="text-xl font-black tracking-tight text-slate-900 uppercase">Collect EMI</h1>
            <p class="text-xs text-slate-400 font-bold mt-1 uppercase tracking-wider">Loan Recovery Ledger Update</p>
        </div>

        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 text-left space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Manual Customer Search</label>
            <div class="flex gap-2">
                <input type="text" id="manualSearchId" placeholder="Enter Customer ID (e.g. HBML-3728)" class="w-full text-sm bg-white border border-slate-200 rounded-xl px-3 py-2 font-mono font-bold uppercase focus:outline-none focus:border-slate-900 transition">
                <button onclick="searchCustomerManual()" class="bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs px-4 rounded-xl transition shadow-xs cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left">
            
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 sm:col-span-2">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-0.5">Customer Name</span>
                <h2 id="name" class="text-base font-black text-slate-500">Enter Customer ID above to search...</h2>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-0.5">Loan Amount</span>
                <h2 id="loan" class="text-base font-bold text-slate-900">₹0</h2>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-0.5">Monthly EMI</span>
                <h2 id="emi" class="text-base font-bold text-slate-900">₹0</h2>
            </div>

            <div class="bg-rose-50/40 p-4 rounded-xl border border-rose-100 sm:col-span-2">
                <span class="text-xs font-bold text-rose-500 uppercase tracking-wider block mb-0.5">Remaining Balance</span>
                <h2 id="balance" class="text-lg font-black text-rose-600 font-mono">₹0</h2>
            </div>

        </div>

        <div class="text-left text-sm space-y-2">
            <label class="text-xs font-bold uppercase tracking-wider text-slate-400 block">Enter EMI Amount to Collect</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-600 text-sm font-bold">₹</span>
                <input type="number" id="amount" placeholder="0.00" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-8 pr-4 py-3 text-sm focus:outline-none focus:border-slate-900 transition font-mono font-bold">
            </div>
        </div>

        <button onclick="collectEMI()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-md tracking-wide text-sm cursor-pointer flex items-center justify-center gap-2">
            <i class="fa-solid fa-wallet"></i> COLLECT EMI PAYMENT
        </button>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        let activeDocId = params.get("id"); 
        let customer = {};

        /* URL ద్వారా లోడ్ చేసే ఫంక్షన్ */
        async function loadCustomerByDocId(documentId){
            if(!documentId) return;
            try {
                const ref = doc(db, "customers", documentId);
                const snap = await getDoc(ref);
                if(snap.exists()){
                    renderCustomerData(snap.data(), snap.id);
                }
            } catch (error) {
                console.error("Error: " + error.message);
            }
        }

        /* మ్యాన్యువల్ గా కంప్లీట్ ఐడీ ద్వారా వెతికే ఫంక్షన్ */
        window.searchCustomerManual = async function() {
            let searchId = document.getElementById("manualSearchId").value.trim().toUpperCase();
            if(!searchId) {
                alert("Please enter a Customer ID");
                return;
            }
            try {
                const q = query(collection(db, "customers"), where("customerId", "==", searchId));
                const querySnapshot = await getDocs(q);
                if(querySnapshot.empty) {
                    alert("No active record found for ID: " + searchId);
                    return;
                }
                querySnapshot.forEach((docRecord) => {
                    renderCustomerData(docRecord.data(), docRecord.id);
                });
            } catch (error) {
                alert("Search Error: " + error.message);
            }
        }

        /* స్క్రీన్ పై డేటాను చూపించే ఫంక్షన్ */
        function renderCustomerData(data, docId) {
            customer = data;
            activeDocId = docId;

            document.getElementById("name").innerHTML = customer.name || "Unknown Profile";
            document.getElementById("name").classList.remove("text-slate-500");
            document.getElementById("name").classList.add("text-slate-900");
            
            document.getElementById("loan").innerHTML = "₹" + Number(customer.loan || 0).toLocaleString('en-IN');
            document.getElementById("emi").innerHTML = "₹" + Number(customer.emi || 0).toLocaleString('en-IN');

            let paid = Number(customer.paid || 0);
            let balance = Number(customer.loan || 0) - paid;
            document.getElementById("balance").innerHTML = "₹" + balance.toLocaleString('en-IN');
            document.getElementById("amount").value = customer.emi || "";
        }

        /* COLLECT EMI PAYMENT */
        window.collectEMI = async function(){
            if(!activeDocId){
                alert("Please look up a customer profile first.");
                return;
            }
            try {
                let amount = Number(document.getElementById("amount").value);
                if(!amount || amount <= 0){
                    alert("Please enter a valid EMI amount.");
                    return;
                }

                let paid = Number(customer.paid || 0) + amount;
                let balance = Number(customer.loan || 0) - paid;

                if (balance < 0) {
                    alert("Amount exceeds total pending loan balance.");
                    return;
                }

                await addDoc(collection(db, "emi_collections"), {
                    customerId: activeDocId,
                    customerName: customer.name,
                    amount: amount,
                    date: new Date()
                });

                await updateDoc(doc(db, "customers", activeDocId), {
                    paid: paid,
                    balance: balance
                });

                customer.paid = paid;
                document.getElementById("balance").innerHTML = "₹" + balance.toLocaleString('en-IN');
                document.getElementById("amount").value = "";
                alert("EMI Collected and Ledger Updated Successfully!");
            } catch(error) {
                alert("Error recording payment: " + error.message);
            }
        }

        /* అలర్ట్ బాక్స్ రాకుండా ఇక్కడ చెక్ మార్చాను */
        window.addEventListener('DOMContentLoaded', () => {
            if(activeDocId) {
                loadCustomerByDocId(activeDocId);
            }
        });
    </script>
</body>
</html>
