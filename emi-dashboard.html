<!DOCTYPE html>
<html>
<head>

<title>EMI Dashboard</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:90px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:25px;
}

.card h2{
color:#0d2b6b;
margin-bottom:10px;
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<h1>HBML EMI Dashboard</h1>

<div class="cards">

<div class="card">
<h2>₹1,25,000</h2>
<p>Today's Collection</p>
</div>

<div class="card">
<h2>₹8,50,000</h2>
<p>Monthly EMI</p>
</div>

<div class="card">
<h2>18</h2>
<p>Pending EMI</p>
</div>

<div class="card">
<h2>150</h2>
<p>Total Customers</p>
</div>

</div>

</body>
</html>
