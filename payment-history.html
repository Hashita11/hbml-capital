<!DOCTYPE html>
<html>

<head>

<title>Payment History</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0d2b6b;
color:white;
padding:14px;
}

table td{
padding:14px;
border-bottom:1px solid #ddd;
text-align:center;
}

.status-paid{
color:green;
font-weight:bold;
}

.status-pending{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>Payment History</h1>

<table>

<tr>
<th>Date</th>
<th>Customer</th>
<th>Amount</th>
<th>Status</th>
</tr>

<tr>
<td>01-05-2026</td>
<td>Ramesh</td>
<td>₹5,000</td>
<td class="status-paid">
Paid
</td>
</tr>

<tr>
<td>01-06-2026</td>
<td>Suresh</td>
<td>₹8,000</td>
<td class="status-pending">
Pending
</td>
</tr>

<tr>
<td>01-07-2026</td>
<td>Kumar</td>
<td>₹12,000</td>
<td class="status-paid">
Paid
</td>
</tr>

</table>

</div>

</body>
</html>
