<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Live Payment History</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.googleapis.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* 👑 Professional Print & PDF Layout Controls */
        @media print {
            html, body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
                height: auto !important;
                overflow: visible !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print, button, a { display: none !important; }
            .main-container { max-width: 100% !important; padding: 0 !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
            
            /* ❌ అదనపు ఖాళీ తెల్ల పేజీలు రాకుండా పేజీ బ్రేక్ నియంత్రణ */
            .history-master-card {
                page-break-inside: avoid !important;
                page-break-after: avoid !important;
                border: 1px solid #cbd5e1 !important;
                box-shadow: none !important;
                background: white !important;
                padding: 12px !important;
            }
            th { background-color: #f8fafc !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; padding: 6px !important; }
            td { border: 1px solid #e2e8f0 !important; color: #334155 !important; padding: 6px !important; }
            div, h1, p, span, strong { color: black !important; }
            
            /* VISIBILITY FIX: ప్రింట్ అయ్యేటప్పుడు టెక్స్ట్ కలర్స్ ముదురు నలుపు షేడ్‌లోకి లాక్ అవుతాయి */
            .text-white { color: #0f172a !important; }
            .text-slate-300 { color: #334155 !important; }
            .text-slate-400 { color: #475569 !important; }
            .text-emerald-400 { color: #166534 !important; font-weight: 800 !important; }
            .text-amber-500 { color: #9a3412 !important; font-weight: 800 !important; }
            .bg-slate-800 { background: transparent !important; border: 1px solid #cbd5e1 !important; color: black !important; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-6">

    <div class="max-w-4xl mx-auto space-y-6 main-container">
        
        <div class="flex justify-between items-center gap-2 no-print w-full">
            <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl transition">
                <i class="fa-solid fa-arrow-left"></i> వెనుకకు వెళ్ళు
            </a>
            <div class="flex items-center gap-2">
                <button onclick="window.print()" class="text-xs font-black text-white uppercase tracking-wider bg-rose-600 hover:bg-rose-500 px-4 py-2.5 rounded-xl transition cursor-pointer flex items-center gap-1.5 shadow-md active:scale-95">
                    <i class="fa-solid fa-file-pdf"></i> Export Statement PDF
                </button>
                <span class="text-[10px] font-black uppercase bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-md border border-emerald-500/20 shadow-xs tracking-wider">
                    Live Audit Stream
                </span>
            </div>
        </div>

        <div class="text-center space-y-2 py-2">
            <img src="logo.png" alt="HBML Logo" class="h-14 w-auto mx-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').classList.remove('hidden')">
            <div id="fallback-icon" class="h-14 w-14 bg-slate-900 text-sky-400 rounded-xl flex items-center justify-center text-2xl font-black shadow-md border border-slate-800 hidden mx-auto">H</div>
            <h1 class="text-xl md:text-2xl font-black tracking-tight text-white uppercase">Global Payment History</h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Real-Time Daily Collection Day Book</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-xl overflow-hidden history-master-card">
            <div class="p-4 bg-slate-900/40 border-b border-slate-800 flex justify-between items-center no-print">
                <span class="text-xs font-black uppercase text-slate-400 tracking-wider">
                    <i class="fa-solid fa-clock-history text-sky-500 mr-1.5"></i> All Received Transactions Log
                </span>
                <span id="lblTotalTxnCounter" class="text-[10px] font-mono font-bold bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-slate-400">Rows: 0</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse min-w-[550px]">
                    <thead class="bg-slate-950 text-slate-400 font-bold uppercase tracking-wider border-b border-slate-800">
                        <tr>
                            <th class="p-4">Payment Date</th>
                            <th class="p-4">Customer Name / ID</th>
                            <th class="p-4">EMI Recovered</th>
                            <th class="p-4">Penalties Paid</th>
                            <th class="p-4 text-right">Payment Channel</th>
                        </tr>
                    </thead>
                    <tbody id="tblHistoryBody" class="divide-y divide-slate-800 font-medium text-slate-300">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-slate-500 font-bold">
                                <i class="fa-solid fa-spinner animate-spin mr-2 text-sky-400"></i> ఫైర్‌బేస్ నుండి రికార్డులను సేకరిస్తున్నాము...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function streamGlobalPaymentHistory() {
            const tbody = document.getElementById("tblHistoryBody");
            try {
                const ref = collection(db, "emi_collections");
                const snap = await getDocs(ref);

                if(snap.empty) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center font-bold text-slate-500"><i class="fa-solid fa-folder-open text-slate-600 mr-1"></i> No transactions logged in the day book yet.</td></tr>`;
                    document.getElementById("lblTotalTxnCounter").innerText = "Rows: 0";
                    return;
                }

                let records = [];
                snap.forEach(doc => {
                    records.push({ id: doc.id, ...doc.data() });
                });

                records.sort((a, b) => {
                    let dateA = a.date?.seconds ? a.date.seconds : new Date(a.date || 0).getTime();
                    let dateB = b.date?.seconds ? b.date.seconds : new Date(b.date || 0).getTime();
                    return dateB - dateA;
                });

                let html = "";
                let totalRows = 0;

                records.forEach((row) => {
                    totalRows++;
                    let displayDate = "—";
                    if(row.date) {
                        let dateObj = row.date.seconds ? new Date(row.date.seconds * 1000) : new Date(row.date);
                        displayDate = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                    }

                    let custName = row.customerName || "N/A";
                    let emiPaid = Number(row.emiAmountPaid || 0);
                    let finePaid = Number(row.penaltyAmountPaid || 0);
                    let channel = row.mode || "Cash";

                    html += `
                        <tr class="hover:bg-slate-900/40 transition border-b border-slate-800/60">
                            <td class="p-4 font-mono font-bold text-slate-400">${displayDate}</td>
                            <td class="p-4 uppercase font-black text-white">${custName}</td>
                            <td class="p-4 font-mono font-bold text-emerald-400">₹${emiPaid.toLocaleString('en-IN')}</td>
                            <td class="p-4 font-mono font-bold text-amber-500">₹${finePaid.toLocaleString('en-IN')}</td>
                            <td class="p-4 text-right">
                                <span class="bg-slate-800 text-slate-300 text-[10px] font-bold uppercase px-2 py-0.5 rounded border border-slate-700">${channel}</span>
                            </td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
                document.getElementById("lblTotalTxnCounter").innerText = "Rows: " + totalRows;

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-rose-500 font-bold">Cloud synchronization timeout.</td></tr>`;
            }
        }

        window.addEventListener('DOMContentLoaded', streamGlobalPaymentHistory);
    </script>
</body>
</html>
