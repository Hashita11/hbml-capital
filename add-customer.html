<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Add Customer Onboarding</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col justify-center items-center p-4" id="body-root">

    <div class="w-full max-w-xl mb-4 flex justify-between items-center">
        <a href="admin.html" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl transition">
            <i class="fa-solid fa-arrow-left"></i> Dashboard కి తిరిగి వెళ్ళు
        </a>
    </div>

    <div class="w-full max-w-xl bg-slate-900 rounded-3xl p-6 md:p-8 shadow-2xl border border-slate-800 text-center">
        
        <div class="flex justify-center mb-4">
            <img src="logo.png" alt="HBML Logo" class="h-16 w-auto" onerror="this.style.display='none'; document.getElementById('fallback-icon').classList.remove('hidden')">
            <div id="fallback-icon" class="h-16 w-16 bg-slate-950 text-sky-400 rounded-2xl flex items-center justify-center text-2xl font-black shadow-md border border-slate-800 hidden">H</div>
        </div>

        <h1 class="text-xl font-black tracking-tight text-white uppercase">Add New Customer</h1>
        <p class="text-xs text-slate-500 font-bold mt-1 mb-6 uppercase tracking-wider">KYC & Financial Onboarding Desk</p>

        <div class="space-y-4 text-left">
            
            <!-- 👑 🏢 NEW REGIONAL BRANCH OPERATIONS SELECTOR -->
            <div class="bg-slate-950/40 p-4 rounded-xl border border-slate-800/60">
                <label class="text-[10px] font-bold uppercase tracking-wider text-amber-400 block mb-1.5"><i class="fa-solid fa-code-branch mr-1"></i> Assign Regional Branch (బ్రాంచ్ ఎంపిక)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-building"></i></span>
                    <select id="ddlBranch" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-hidden focus:border-sky-500 appearance-none cursor-pointer font-bold text-slate-200">
                        <option value="Tanuku">Tanuku Branch (Headquarters)</option>
                        <option value="Velpur">Velpur Branch (Regional Office)</option>
                        <option value="Undrajavaram">Undrajavaram Branch (Regional Office)</option>
                        <option value="Relangi">Relangi Branch (Regional Office)</option>
                    </select>
                    <span class="absolute inset-y-0 right-4 flex items-center text-slate-500 text-[10px] pointer-events-none"><i class="fa-solid fa-chevron-down"></i></span>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Customer ID (Auto-Generated)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-id-badge"></i></span>
                    <input type="text" id="customerId" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs font-mono font-bold text-slate-400 outline-hidden cursor-not-allowed" readonly>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Customer Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="name" placeholder="Enter Full Name" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white focus:outline-hidden focus:border-sky-500 transition uppercase">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Phone Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-phone"></i></span>
                        <input type="text" id="phone" placeholder="Enter 10-Digit Mobile" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white focus:outline-hidden focus:border-sky-500 transition">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-slate-950/40 p-4 rounded-xl border border-slate-800/60">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Aadhaar Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-fingerprint"></i></span>
                        <input type="text" id="aadhaar" maxlength="12" placeholder="12 Digit Number" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-xs text-white focus:outline-hidden focus:border-sky-500 transition font-mono">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">PAN Card Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-address-card"></i></span>
                        <input type="text" id="pan" maxlength="10" placeholder="ABCDE1234F" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-xs text-white focus:outline-hidden focus:border-sky-500 transition font-mono uppercase">
                    </div>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Permanent Address</label>
                <div class="relative">
                    <span class="absolute top-3.5 left-4 text-slate-500 text-xs"><i class="fa-solid fa-location-dot"></i></span>
                    <input type="text" id="address" placeholder="Enter Street, Village, Mandal, City" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white focus:outline-hidden focus:border-sky-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Loan Type (లోన్ రకం)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-folder-open"></i></span>
                        <select id="loanType" onchange="handleLoanTypeChange()" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-hidden focus:border-sky-500 appearance-none cursor-pointer font-bold text-slate-300">
                            <option value="Microfinance Loan">Microfinance Loan (మైక్రోఫైనాన్స్ లోన్)</option>
                            <option value="Gold Loan">Gold Loan (బంగారు తాకట్టు లోన్)</option>
                            <option value="Personal Loan">Personal Loan (వ్యక్తిగత లోన్)</option>
                            <option value="Business Loan">Business Loan (వ్యాపార లోన్)</option>
                            <option value="Vehicle Loan">Vehicle Loan (వాహన లోన్)</option>
                        </select>
                        <span class="absolute inset-y-0 right-4 flex items-center text-slate-500 text-[10px] pointer-events-none"><i class="fa-solid fa-chevron-down"></i></span>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Interest Method (వడ్డీ విధానం)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-gears"></i></span>
                        <select id="interestMethod" onchange="calculateAutoEMI()" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-hidden focus:border-sky-500 appearance-none cursor-pointer font-bold text-sky-400">
                            <option value="Flat">Flat Interest Rate (స్థిర వడ్డీ)</option>
                            <option value="Reducing">Reducing Balance Rate (తగ్గే అసలు వడ్డీ)</option>
                        </select>
                        <span class="absolute inset-y-0 right-4 flex items-center text-slate-500 text-[10px] pointer-events-none"><i class="fa-solid fa-chevron-down"></i></span>
                    </div>
                </div>
            </div>

            <div id="goldLoanTermBox" class="bg-amber-950/20 p-4 rounded-xl border border-amber-900/30 hidden">
                <label class="text-[10px] font-black uppercase tracking-wider text-amber-400 block mb-1.5"><i class="fa-solid fa-coins"></i> Gold Loan Repayment Term</label>
                <div class="relative">
                    <select id="goldRepaymentTerm" onchange="handleGoldRepaymentLogic()" class="w-full bg-slate-950 border border-amber-900/30 rounded-xl px-3 py-2.5 text-xs focus:outline-hidden focus:border-amber-500 appearance-none cursor-pointer font-bold text-slate-200">
                        <option value="EveryMonth">Every Month EMI (నెలనెలా వడ్డీ/EMI విధానం)</option>
                        <option value="6Months">6 Months Bullet Payment (6 నెలల ఒకేసారి చెల్లింపు)</option>
                        <option value="1Year">1 Year Bullet Payment (1 సంవత్సరం ఒకేసారి చెల్లింపు)</option>
                    </select>
                    <span class="absolute inset-y-0 right-4 flex items-center text-slate-500 text-[10px] pointer-events-none"><i class="fa-solid fa-chevron-down"></i></span>
                </div>
            </div>

            <div class="bg-slate-950/40 p-4 rounded-xl border border-slate-800 space-y-4">
                <span class="text-[10px] font-black uppercase tracking-wider text-slate-400 block border-b border-slate-800 pb-1.5"><i class="fa-solid fa-calculator text-sky-400 mr-1"></i> Configure Loan Metrics</span>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 block mb-1">Loan Principal</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 font-bold">₹</span>
                            <input type="number" id="loan" oninput="calculateAutoEMI()" placeholder="0" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-6 pr-2 py-2 text-xs font-mono font-bold text-white focus:outline-hidden focus:border-sky-500">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 block mb-1">Interest Rate (Annum)</label>
                        <div class="relative">
                            <input type="number" id="interestRate" oninput="calculateAutoEMI()" value="12" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-3 pr-6 py-2 text-xs font-mono font-bold text-white focus:outline-hidden focus:border-sky-500">
                            <span class="absolute inset-y-0 right-3 flex items-center text-slate-500 font-bold text-[10px]">%</span>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 block mb-1">Tenure (Months)</label>
                        <div class="relative">
                            <input type="number" id="tenure" oninput="calculateAutoEMI()" value="12" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-3 pr-12 py-2 text-xs font-mono font-bold text-white focus:outline-hidden focus:border-sky-500">
                            <span class="absolute inset-y-0 right-2 flex items-center text-slate-500 text-[9px] font-bold">Months</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Total Payable (Principal + Int)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400 text-xs font-bold">₹</span>
                        <input type="number" id="totalPayable" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-8 pr-4 py-3 text-xs font-mono font-bold text-slate-400 outline-hidden cursor-not-allowed" readonly>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Calculated Monthly EMI</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-emerald-400 text-xs font-bold">₹</span>
                        <input type="number" id="emi" oninput="handleManualEMIChange()" class="w-full bg-emerald-950/20 border border-emerald-900/30 rounded-xl pl-8 pr-4 py-3 text-xs font-mono font-black text-emerald-400 focus:outline-hidden focus:border-emerald-500">
                    </div>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block mb-1.5">Monthly EMI Due Date</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 text-xs"><i class="fa-solid fa-calendar-day"></i></span>
                    <select id="dueDay" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-hidden focus:border-sky-500 transition appearance-none cursor-pointer font-bold text-slate-300">
                        <option value="2">Every Month 2nd (ప్రతి నెల 2వ తేదీ)</option>
                        <option value="6">Every Month 6th (ప్రతి నెల 6వ తేదీ)</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 pointer-events-none text-xs"><i class="fa-solid fa-chevron-down"></i></span>
                </div>
            </div>

        </div>

        <button id="btnSaveButton" onclick="saveCustomer()" class="w-full mt-6 bg-sky-600 hover:bg-sky-500 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-md tracking-wide text-xs cursor-pointer flex items-center justify-center gap-2">
            <i class="fa-solid fa-cloud-arrow-up" id="saveIcon"></i> SAVE CUSTOMER PROFILE
        </button>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isSubmittingGate = false;

        function generateCustomerID() {
            const randomNumber = Math.floor(1000 + Math.random() * 9000); 
            document.getElementById("customerId").value = "HBML-" + randomNumber;
        }

        window.handleLoanTypeChange = function() {
            let loanType = document.getElementById("loanType").value;
            let goldBox = document.getElementById("goldLoanTermBox");
            let interestDropdown = document.getElementById("interestMethod");

            if(loanType === "Gold Loan") {
                goldBox.classList.remove("hidden");
                interestDropdown.value = "Flat";
                handleGoldRepaymentLogic();
            } else {
                goldBox.classList.add("hidden");
                document.getElementById("tenure").removeAttribute("readonly");
                document.getElementById("tenure").classList.remove("bg-slate-800", "text-slate-500");
                calculateAutoEMI();
            }
        }

        window.handleGoldRepaymentLogic = function() {
            let goldTerm = document.getElementById("goldRepaymentTerm").value;
            let tenureInput = document.getElementById("tenure");

            if(goldTerm === "6Months") {
                tenureInput.value = 6;
                tenureInput.setAttribute("readonly", "true");
                tenureInput.classList.add("bg-slate-800", "text-slate-500");
            } else if(goldTerm === "1Year") {
                tenureInput.value = 12;
                tenureInput.setAttribute("readonly", "true");
                tenureInput.classList.add("bg-slate-800", "text-slate-500");
            } else {
                tenureInput.removeAttribute("readonly");
                tenureInput.classList.remove("bg-slate-800", "text-slate-500");
            }
            calculateAutoEMI();
        }

        window.calculateAutoEMI = function() {
            let principal = Number(document.getElementById("loan").value || 0);
            let annualRate = Number(document.getElementById("interestRate").value || 0);
            let months = Number(document.getElementById("tenure").value || 1);
            let method = document.getElementById("interestMethod").value;
            let loanType = document.getElementById("loanType").value;
            let goldTerm = document.getElementById("goldRepaymentTerm").value;

            if(principal > 0 && months > 0) {
                let totalPayable = 0;
                let monthlyEmi = 0;

                if(loanType === "Gold Loan" && (goldTerm === "6Months" || goldTerm === "1Year")) {
                    let totalInterest = principal * (annualRate / 100) * (months / 12);
                    totalPayable = principal + totalInterest;
                    monthlyEmi = 0; 
                } else {
                    if (method === "Flat") {
                        let years = months / 12;
                        let totalInterest = principal * (annualRate / 100) * years;
                        totalPayable = principal + totalInterest;
                        monthlyEmi = totalPayable / months;
                    } else {
                        let monthlyRate = (annualRate / 12) / 100;
                        monthlyEmi = (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
                        totalPayable = monthlyEmi * months;
                    }
                }

                document.getElementById("totalPayable").value = Math.round(totalPayable);
                document.getElementById("emi").value = Math.round(monthlyEmi);
            } else {
                document.getElementById("totalPayable").value = "";
                document.getElementById("emi").value = "";
            }
        }

        window.handleManualEMIChange = function() {
            let manualEmi = Number(document.getElementById("emi").value || 0);
            let months = Number(document.getElementById("tenure").value || 1);
            let loanType = document.getElementById("loanType").value;
            
            if(manualEmi > 0 && loanType !== "Gold Loan") {
                let totalPayableCalculated = manualEmi * months;
                document.getElementById("totalPayable").value = Math.round(totalPayableCalculated);
            }
        }

        window.addEventListener('DOMContentLoaded', generateCustomerID);

        window.saveCustomer = async function() {
            if (isSubmittingGate) return;

            try {
                let selectedBranch = document.getElementById("ddlBranch").value;
                let customerId = document.getElementById("customerId").value;
                let name = document.getElementById("name").value.trim();
                let phone = document.getElementById("txtPhone") ? document.getElementById("txtPhone").value.trim() : document.getElementById("phone").value.trim();
                let aadhaar = document.getElementById("aadhaar").value.trim();
                let pan = document.getElementById("pan").value.trim().toUpperCase();
                let address = document.getElementById("address").value.trim();
                
                let loanType = document.getElementById("loanType").value;
                let interestMethod = document.getElementById("interestMethod").value;
                let goldRepaymentTerm = (loanType === "Gold Loan") ? document.getElementById("goldRepaymentTerm").value : "N/A";
                
                let loanPrincipal = document.getElementById("loan").value;
                let interestRate = document.getElementById("interestRate").value;
                let tenureMonths = document.getElementById("tenure").value;
                let totalPayable = document.getElementById("totalPayable").value;
                let emi = document.getElementById("emi").value;
                let dueDay = document.getElementById("dueDay").value;

                if(!name || !phone || !aadhaar || !pan || !loanPrincipal || !dueDay) {
                    alert("Please fill in all mandatory fields.");
                    return;
                }

                if(phone.length !== 10) return alert("Please enter a valid 10-digit mobile number.");
                if(aadhaar.length !== 12) return alert("Aadhaar Number must be exactly 12 digits.");

                const btn = document.getElementById("btnSaveButton");
                const icon = document.getElementById("saveIcon");

                isSubmittingGate = true;
                btn.disabled = true;
                btn.classList.add("opacity-50", "cursor-not-allowed");
                icon.className = "fa-solid fa-spinner animate-spin";

                let finalEmi = Number(emi);
                let finalTenure = Number(tenureMonths);
                let finalLoanAmountValue = Number(totalPayable);

                // 👑 🏢 NEW SYNC PARAMETER: బ్రాంచ్‌తో సహా డాక్యుమెంట్ క్లౌడ్ లోకి వెళ్తుంది
                await addDoc(collection(db, "customers"), {
                    customerId: customerId,
                    branch: selectedBranch,
                    name: name,
                    phone: phone,
                    aadhaar: aadhaar,
                    pan: pan,
                    address: address,
                    loanType: loanType,
                    interestMethod: interestMethod,
                    goldRepaymentTerm: goldRepaymentTerm,
                    loanPrincipal: Number(loanPrincipal),
                    interestRate: Number(interestRate),
                    tenureMonths: finalTenure,
                    loan: finalLoanAmountValue, 
                    emi: finalEmi,
                    dueDay: Number(dueDay),
                    paid: 0,
                    balance: finalLoanAmountValue, 
                    created: new Date()
                });

                alert("Customer Profile [ " + customerId + " ] Allocated to " + selectedBranch + " Branch Successfully!");

                document.getElementById("name").value = "";
                if(document.getElementById("txtPhone")) document.getElementById("txtPhone").value = "";
                document.getElementById("phone").value = "";
                document.getElementById("aadhaar").value = "";
                document.getElementById("pan").value = "";
                document.getElementById("address").value = "";
                document.getElementById("loan").value = "";
                document.getElementById("totalPayable").value = "";
                document.getElementById("emi").value = "";
                
                isSubmittingGate = false;
                btn.disabled = false;
                btn.classList.remove("opacity-50", "cursor-not-allowed");
                icon.className = "fa-solid fa-cloud-arrow-up";
                
                generateCustomerID();

            } catch(error) {
                alert("Error writing document: " + error.message);
                isSubmittingGate = false;
                const btn = document.getElementById("btnSaveButton");
                const icon = document.getElementById("saveIcon");
                btn.disabled = false;
                btn.classList.remove("opacity-50", "cursor-not-allowed");
                icon.className = "fa-solid fa-cloud-arrow-up";
            }
        }
    </script>
</body>
</html>
