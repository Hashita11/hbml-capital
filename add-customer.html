<!DOCTYPE html>
<html>
<head>
<title>Add Customer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,sans-serif;
background:#f2f4f8;
padding:20px;
}

.box{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#0d2b6b;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#163c91;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>Add Customer</h1>

<input type="text" id="name" placeholder="Customer Name">

<input type="text" id="phone" placeholder="Phone Number">

<input type="text" id="address" placeholder="Address">

<input type="number" id="loan" placeholder="Loan Amount">

<input type="number" id="emi" placeholder="Monthly EMI">

<button onclick="saveCustomer()">
Save Customer
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
authDomain: "hbml-capital.firebaseapp.com",
projectId: "hbml-capital",
storageBucket: "hbml-capital.firebasestorage.app",
messagingSenderId: "893969951538",
appId: "1:893969951538:web:ba028463a6adcfb417c52b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveCustomer = async function(){

try{

let name =
document.getElementById("name").value;

let phone =
document.getElementById("phone").value;

let address =
document.getElementById("address").value;

let loan =
document.getElementById("loan").value;

let emi =
document.getElementById("emi").value;

if(!name || !phone){
alert("Please enter Name and Phone Number");
return;
}

await addDoc(collection(db,"customers"),{

name:name,
phone:phone,
address:address,
loan:Number(loan),
emi:Number(emi),
created:new Date()

});

alert("Customer Saved Successfully");

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("address").value="";
document.getElementById("loan").value="";
document.getElementById("emi").value="";

}
catch(error){

console.log(error);
alert("Error : " + error.message);

}

}

</script>

</body>
</html>
