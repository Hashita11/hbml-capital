<!DOCTYPE html>
<html>
<head>

<title>Staff Salary</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
max-width:900px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0d2b6b;
color:white;
padding:14px;
}

td{
padding:14px;
border-bottom:1px solid #ddd;
text-align:center;
}

.pay{
background:green;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>Staff Salary Management</h1>

<table>

<tr>
<th>Employee</th>
<th>Role</th>
<th>Salary</th>
<th>Status</th>
</tr>

<tr>
<td>Suresh</td>
<td>Manager</td>
<td>₹25,000</td>
<td>
<button class="pay"
onclick="paySalary()">
Pay Salary
</button>
</td>
</tr>

</table>

</div>

<script>

function paySalary(){

alert("Salary Paid Successfully");

}

</script>

</body>
</html>
