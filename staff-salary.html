<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBML Capital - Professional Salary Slip Engine</title>
    <!-- Modern Tailwind CSS V4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* 👑 Professional Print & PDF Layout Controls */
        @media print {
            html, body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
                height: auto !important;
            }
            .no-print { display: none !important; }
            .main-container { max-width: 100% !important; padding: 0 !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
            .salary-slip-card {
                page-break-inside: avoid !important;
                border: 1px solid #e2e8f0 !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 20px !important;
                background: white !important;
            }
            th { background-color: #f8fafc !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; }
            td { border: 1px solid #e2e8f0 !important; color: #334155 !important; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-6 main-container">
        
        <!-- TOP CONTROL NAVIGATION BAR -->
        <div class="flex justify-between items-center no-print bg-white p-4 rounded-2xl shadow-xs border border-slate-200/80 w-full">
            <a href="admin.html" class="inline-flex items-center gap-2 text-xs font-bold text-slate-600 hover:text-slate-900 bg-slate-50 border border-slate-200 px-4 py-2.5 rounded-xl transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
            <div class="flex items-center gap-3">
                <button onclick="window.print()" class="text-xs font-bold text-white uppercase tracking-wider bg-indigo-600 hover:bg-indigo-500 px-5 py-2.5 rounded-xl transition cursor-pointer flex items-center gap-2 shadow-md active:scale-95">
                    <i class="fa-solid fa-print"></i> Print / Save PDF
                </button>
            </div>
        </div>

        <!-- LIVE PAYROLL SEARCH & SELECTION FILTERS -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200/60 no-print space-y-4">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h2 class="text-sm font-extrabold text-slate-800 uppercase tracking-tight flex items-center gap-2">
                    <i class="fa-solid fa-id-card-clip text-indigo-600"></i> Generate Bank-Standard Salary Slips
                </h2>
                <span class="text-[10px] font-bold uppercase bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full border border-indigo-100">
                    Verified Format
                </span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-1.5">Select Disbursed Employee</label>
                    <select id="employeeSelect" onchange="generateSalarySlipUI()" class="w-full text-xs font-semibold bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-700 focus:outline-none focus:border-indigo-500 transition cursor-pointer">
                        <option value="">-- Choose Disbursed Employee --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] font-extrabold text-slate-500 uppercase tracking-wider mb-1.5">Salary Month & Year</label>
                    <input type="month" id="salaryMonth" onchange="generateSalarySlipUI()" class="w-full text-xs font-semibold bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-slate-700 focus:outline-none focus:border-indigo-500 transition">
                </div>
            </div>
        </div>

        <!-- 👑 THE PROFESSIONAL SALARY SLIP TEMPLATE CONTAINER -->
        <div id="salarySlipPrintArea" class="hidden"></div>

        <!-- EMPTY STATE INITIALIZER -->
        <div id="emptyState" class="bg-white rounded-3xl p-12 text-center border border-slate-200/60 shadow-xs no-print">
            <div class="w-16 h-16 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-slate-100">
                <i class="fa-solid fa-file-invoice-dollar text-2xl"></i>
            </div>
            <h3 class="text-sm font-bold text-slate-700 uppercase">No Employee Selected</h3>
            <p class="text-xs text-slate-400 mt-1 max-w-sm mx-auto">Please select a disbursed employee from the dropdown filter menu above to generate a professional bank-verified salary slip.</p>
        </div>

    </div>

    <!-- FIREBASE ARCHITECTURE ENGINE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",
            authDomain: "hbml-capital.firebaseapp.com",
            projectId: "hbml-capital",
            storageBucket: "hbml-capital.firebasestorage.app",
            messagingSenderId: "893969951538",
            appId: "1:893969951538:web:ba028463a6adcfb417c52b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cachedDisbursements = [];
        let cachedEmployees = {};

        const now = new Date();
        document.getElementById('salaryMonth').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        async function initSalarySlipEngine() {
            try {
                const selectEl = document.getElementById("employeeSelect");
                
                // 1. Employees లిస్ట్ లోడ్ చేయడం
                const empSnap = await getDocs(collection(db, "employees"));
                empSnap.forEach(d => { cachedEmployees[d.id] = d.data(); });

                // 2. Disbursements లిస్ట్ లోడ్ చేయడం
                const disbSnap = await getDocs(collection(db, "salary_disbursements"));
                cachedDisbursements = [];

                if (!disbSnap.empty) {
                    disbSnap.forEach(docRecord => {
                        const data = docRecord.data();
                        cachedDisbursements.push({ id: docRecord.id, ...data });
                    });
                } else {
                    // క్లౌడ్ లో రికార్డులు లేకపోతే ప్రదర్శన కోసం డెమో డేటా లోడ్ అవుతుంది
                    cachedDisbursements = [{
                        id: "DEMO-LEGER-01",
                        employeeDocId: "demo_naresh",
                        employeeName: "NARESH",
                        amountPaid: 12500,
                        calculatedPaidDays: 25,
                        calculatedAbsentDays: 5,
                        totalLateMarks: 1,
                        disbursedAt: new Date()
                    }];
                    cachedEmployees["demo_naresh"] = { employeeId: "HBML-LJHEP", name: "NARESH", role: "Field Agent", branch: "Tanuku Head Office", salary: 15000 };
                }

                let dropdownHtml = `<option value="">-- Choose Disbursed Employee --</option>`;
                cachedDisbursements.forEach(res => {
                    dropdownHtml += `<option value="${res.id}">${res.employeeName} (₹${Number(res.amountPaid).toLocaleString('en-IN')})</option>`;
                });
                selectEl.innerHTML = dropdownHtml;

            } catch (error) {
                console.error("Error loading records:", error);
                // నెట్‌వర్క్ ఎర్రర్ వస్తే డెమో ప్యానెల్ ఆక్టివేట్ అవుతుంది
                cachedDisbursements = [{
                    id: "DEMO-LEGER-01",
                    employeeDocId: "demo_naresh",
                    employeeName: "NARESH",
                    amountPaid: 12500,
                    calculatedPaidDays: 25,
                    calculatedAbsentDays: 5,
                    totalLateMarks: 1,
                    disbursedAt: new Date()
                }];
                cachedEmployees["demo_naresh"] = { employeeId: "HBML-LJHEP", name: "NARESH", role: "Field Agent", branch: "Tanuku Head Office", salary: 15000 };
                
                let dropdownHtml = `<option value="">-- Choose Disbursed Employee --</option>`;
                cachedDisbursements.forEach(res => {
                    dropdownHtml += `<option value="${res.id}">${res.employeeName} (₹${Number(res.amountPaid).toLocaleString('en-IN')})</option>`;
                });
                document.getElementById("employeeSelect").innerHTML = dropdownHtml;
            }
        }

        window.generateSalarySlipUI = function() {
            const selectId = document.getElementById("employeeSelect").value;
            const printArea = document.getElementById("salarySlipPrintArea");
            const emptyState = document.getElementById("emptyState");

            if (!selectId) {
                printArea.classList.add("hidden");
                emptyState.classList.remove("hidden");
                return;
            }

            const record = cachedDisbursements.find(r => r.id === selectId);
            if (!record) return;

            const empMeta = cachedEmployees[record.employeeDocId] || { name: "Naresh", employeeId: "HBML-LJHEP", branch: "Tanuku HQ", salary: 15000 };
            const empID = empMeta.employeeId || "HBML-LJHEP";
            const designation = empMeta.role || empMeta.designation || "Field Agent";
            const branchLocation = empMeta.branch || "Tanuku HQ";
            const baseSalaryScale = Number(empMeta.salary || 15000);
            
            const monthInput = document.getElementById("salaryMonth").value;
            const dateObj = new Date(monthInput + "-01");
            const monthName = dateObj.toLocaleString('en-US', { month: 'long', year: 'numeric' });
            
            let disbursementDate = new Date().toLocaleDateString('en-IN');

            const basicEarnings = Math.round(baseSalaryScale * 0.50);
            const hraAllowance = Math.round(baseSalaryScale * 0.30);
            const specialAllowances = baseSalaryScale - (basicEarnings + hraAllowance);
            const totalDeductionsLoss = baseSalaryScale - Number(record.amountPaid);

            function convertNumberToWords(num) {
                const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
                const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
                if ((num = num.toString()).length > 9) return 'Overflow';
                let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
                if (!n) return ''; 
                let str = '';
                str += (Number(n[1]) != 0) ? (a[Number(n[1])] || b[n[1].charAt(0)] + ' ' + a[n[1].charAt(1)]) + 'Crore ' : '';
                str += (Number(n[2]) != 0) ? (a[Number(n[2])] || b[n[2].charAt(0)] + ' ' + a[n[2].charAt(1)]) + 'Lakh ' : '';
                str += (Number(n[3]) != 0) ? (a[Number(n[3])] || b[n[3].charAt(0)] + ' ' + a[n[3].charAt(1)]) + 'Thousand ' : '';
                str += (Number(n[4]) != 0) ? (a[Number(n[4])] || b[n[4].charAt(0)] + ' ' + a[n[4].charAt(1)]) + 'Hundred ' : '';
                str += (Number(n[5]) != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5].charAt(0)] + ' ' + a[n[5].charAt(1)]) + 'Only' : 'Only';
                return str.trim();
            }

            printArea.innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl border border-slate-200/70 p-6 md:p-8 space-y-6 salary-slip-card relative overflow-hidden text-left mt-4">
                    <div class="absolute top-0 left-0 right-0 h-2 bg-indigo-950"></div>

                    <!-- CORPORATE HEADER & LOGO -->
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-200 pb-5 gap-4">
                        <div class="space-y-1">
                            <div class="flex items-center gap-2">
                                <img src="logo.png" alt="HBML Logo" class="h-10 w-auto" onerror="this.style.display='none'; document.getElementById('slip-fallback-icon').classList.remove('hidden')">
                                <div id="slip-fallback-icon" class="bg-indigo-950 text-white w-7 h-7 rounded-lg flex items-center justify-center font-black text-sm tracking-tighter hidden">HB</div>
                                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight uppercase">Harshita Blooms Microloans Pvt Ltd</h1>
                            </div>
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide px-1">
                                <i class="fa-solid fa-location-dot text-indigo-950 mr-1"></i> Head Office: Tanuku, Andhra Pradesh, India
                            </p>
                        </div>
                        <div class="text-left md:text-right">
                            <h2 class="text-lg font-black text-indigo-950 uppercase tracking-tight">Payslip Statement</h2>
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Month: <span class="text-slate-800 font-extrabold">${monthName}</span></p>
                        </div>
                    </div>

                    <!-- EMPLOYEE PROFILE MATRIX -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3.5 bg-slate-50/70 p-4 rounded-xl border border-slate-100 text-xs">
                        <div class="flex justify-between items-center border-b border-slate-200/50 pb-1.5">
                            <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px]">Employee ID</span>
                            <span class="font-mono font-bold text-slate-800">${empID}</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-slate-200/50 pb-1.5">
                            <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px]">Branch Office</span>
                            <span class="font-extrabold text-slate-800 uppercase">${branchLocation}</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-slate-200/50 pb-1.5">
                            <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px]">Staff Name</span>
                            <span class="font-extrabold text-slate-900 uppercase">${record.employeeName}</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-slate-200/50 pb-1.5">
                            <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px]">Disbursal Date</span>
                            <span class="font-bold text-slate-800">${disbursementDate}</span>
                        </div>
                        <div class="flex justify-between items-center md:border-none pb-1.5 md:pb-0">
                            <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px]">Designation</span>
                            <span class="font-bold text-slate-700 uppercase">${designation}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px]">Total Late Marks</span>
                            <span class="font-bold ${record.totalLateMarks > 0 ? 'text-amber-600 font-extrabold' : 'text-slate-700'}">${record.totalLateMarks} Marks</span>
                        </div>
                    </div>

                    <!-- FINANCIAL BALANCED LEDGER TABLE -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-px bg-slate-200 border border-slate-200 rounded-xl overflow-hidden text-xs">
                        <div class="bg-white p-0 flex flex-col justify-between">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 border-b border-slate-200 font-bold uppercase tracking-wider text-[10px] text-slate-500">
                                    <tr>
                                        <th class="p-3">Earnings Breakup</th>
                                        <th class="p-3 text-right">Amount</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 font-medium text-slate-600">
                                    <tr>
                                        <td class="p-3 font-semibold text-slate-700">Basic Salary (50%)</td>
                                        <td class="p-3 text-right font-mono font-bold text-slate-800">₹${basicEarnings.toLocaleString('en-IN')}.00</td>
                                    </tr>
                                    <tr>
                                        <td class="p-3 font-semibold text-slate-700">HRA Allowance (30%)</td>
                                        <td class="p-3 text-right font-mono font-bold text-slate-800">₹${hraAllowance.toLocaleString('en-IN')}.00</td>
                                    </tr>
                                    <tr>
                                        <td class="p-3 font-semibold text-slate-700">Special Allowances</td>
                                        <td class="p-3 text-right font-mono font-bold text-slate-800">₹${specialAllowances.toLocaleString('en-IN')}.00</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="bg-slate-50/60 p-3 flex justify-between items-center font-bold border-t border-slate-200 text-slate-700 mt-auto">
                                <span class="uppercase text-[10px]">Gross Scale Matrix:</span>
                                <span class="font-mono font-extrabold">₹${baseSalaryScale.toLocaleString('en-IN')}.00</span>
                            </div>
                        </div>

                        <div class="bg-white p-0 flex flex-col justify-between border-t md:border-t-0 md:border-l border-slate-200">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 border-b border-slate-200 font-bold uppercase tracking-wider text-[10px] text-slate-500">
                                    <tr>
                                        <th class="p-3">Deductions</th>
                                        <th class="p-3 text-right">Amount</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 font-medium text-slate-600">
                                    <tr>
                                        <td class="p-3 font-semibold text-slate-700">LWP / Absent Cuts</td>
                                        <td class="p-3 text-right font-mono font-bold text-rose-600">₹${totalDeductionsLoss.toLocaleString('en-IN')}.00</td>
                                    </tr>
                                    <tr>
                                        <td class="p-3 font-semibold text-slate-400 italic">Professional Tax (PT)</td>
                                        <td class="p-3 text-right font-mono text-slate-400">₹0.00</td>
                                    </tr>
                                    <tr>
                                        <td class="p-3 font-semibold text-slate-400 italic">Provident Fund (PF)</td>
                                        <td class="p-3 text-right font-mono text-slate-400">₹0.00</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="bg-slate-50/60 p-3 flex justify-between items-center font-bold border-t border-slate-200 text-slate-700 mt-auto">
                                <span class="uppercase text-[10px] text-rose-600">Total Deductions:</span>
                                <span class="font-mono font-extrabold text-rose-600">₹${totalDeductionsLoss.toLocaleString('en-IN')}.00</span>
                            </div>
                        </div>
                    </div>

                    <!-- PAYABLE SUMMARY BAR -->
                    <div class="bg-indigo-950 rounded-xl p-4 text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                        <div class="space-y-0.5">
                            <span class="text-[9px] font-extrabold uppercase tracking-widest text-indigo-300">Amount Disbursed (In Words)</span>
                            <div class="text-xs font-bold capitalize text-slate-100">${convertNumberToWords(record.amountPaid)}</div>
                        </div>
                        <div class="text-left md:text-right w-full md:w-auto border-t md:border-none border-indigo-950/60 pt-2.5 md:pt-0 flex justify-between md:block">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-indigo-300 md:block mr-2 md:mr-0">Net Disbursed Take-Home:</span>
                            <span class="text-xl font-black font-mono tracking-tight text-white">₹${Number(record.amountPaid).toLocaleString('en-IN')}.00</span>
                        </div>
                    </div>

                    <!-- ATTENDANCE SUMMARY -->
                    <div class="border border-slate-200/70 rounded-xl p-3.5 bg-slate-50/40 text-[11px] grid grid-cols-2 sm:grid-cols-3 gap-4 text-center">
                        <div class="space-y-0.5">
                            <span class="text-slate-400 font-bold uppercase text-[9px] tracking-wider block">Calculated Paid Days</span>
                            <span class="font-bold text-slate-700 text-xs">${record.calculatedPaidDays} Days</span>
                        </div>
                        <div class="space-y-0.5 border-l border-slate-200">
                            <span class="text-slate-400 font-bold uppercase text-[9px] tracking-wider block">LWP Days</span>
                            <span class="font-bold text-rose-600 text-xs">${record.calculatedAbsentDays} Days</span>
                        </div>
                        <div class="space-y-0.5 border-t sm:border-t-0 sm:border-l border-slate-200 col-span-2 sm:col-span-1">
                            <span class="text-slate-400 font-bold uppercase text-[9px] tracking-wider block">Payroll Status</span>
                            <span class="text-emerald-600 font-extrabold text-xs uppercase tracking-wider flex items-center justify-center gap-1">
                                <i class="fa-solid fa-circle-check"></i> Disbursed
                            </span>
                        </div>
                    </div>

                    <!-- SIGNATURE BLOCK -->
                    <div class="pt-8 flex justify-between items-end text-xs">
                        <div class="text-center space-y-1.5 w-36">
                            <div class="border-b border-slate-300 h-8"></div>
                            <p class="font-bold text-slate-500 uppercase tracking-wider text-[9px]">Employee Signature</p>
                        </div>
                        <div class="text-center space-y-1.5 w-48 text-right">
                            <div class="h-8 flex items-center justify-end">
                                <span class="font-serif italic text-indigo-950 font-extrabold text-sm tracking-wide bg-slate-50 border border-slate-100 px-2 py-0.5 rounded shadow-2xs">For HBML Capital</span>
                            </div>
                            <p class="font-bold text-indigo-950 uppercase tracking-wider text-[9px]">Authorized Management Signatory</p>
                        </div>
                    </div>

                </div>
            `;
            printArea.classList.remove("hidden");
            emptyState.classList.add("hidden");
        }

        window.addEventListener('DOMContentLoaded', initSalarySlipEngine);
    </script>
</body>
</html>
