<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HBML Capital | Customer Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef2f7;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
background:#0d2b6b;
color:white;
padding:20px;
border-radius:15px;
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
background:white;
padding:5px;
border-radius:10px;
}

.header h1{
font-size:28px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
margin-bottom:20px;
}

.profile{
display:grid;
grid-template-columns:180px 1fr;
gap:25px;
}

.photo{
width:160px;
height:160px;
border-radius:50%;
border:4px solid #0d2b6b;
object-fit:cover;
}

.info{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.item{
background:#f7f9fc;
padding:15px;
border-radius:10px;
}

.label{
font-size:13px;
color:#666;
margin-bottom:5px;
}

.value{
font-size:18px;
font-weight:bold;
color:#0d2b6b;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.summary .box{
padding:18px;
border-radius:12px;
color:white;
text-align:center;
}

.loan{background:#1565c0;}
.paid{background:#2e7d32;}
.balance{background:#ef6c00;}
.emi{background:#6a1b9a;}

.summary h2{
font-size:28px;
margin-top:10px;
}

.actions{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
color:white;
}

.collect{background:#2e7d32;}
.edit{background:#1565c0;}
.delete{background:#c62828;}
.print{background:#6a1b9a;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#0d2b6b;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

@media(max-width:700px){

.profile{
grid-template-columns:1fr;
text-align:center;
}

.photo{
margin:auto;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<img src="logo.png" class="logo">

<div>
<h1>HBML CAPITAL</h1>
<p>Customer Profile</p>
</div>

</div>

<div class="card">

<div class="profile">

<img src="user.png" class="photo" id="photo">

<div class="info">

<div class="item">
<div class="label">Customer Name</div>
<div class="value" id="name">Loading...</div>
</div>

<div class="item">
<div class="label">Phone Number</div>
<div class="value" id="phone">Loading...</div>
</div>

<div class="item">
<div class="label">Address</div>
<div class="value" id="address">Loading...</div>
</div>

<div class="item">
<div class="label">Loan Amount</div>
<div class="value" id="loan">₹0</div>
</div>

<div class="item">
<div class="label">Monthly EMI</div>
<div class="value" id="emi">₹0</div>
</div>

<div class="item">
<div class="label">Customer ID</div>
<div class="value" id="customerId">---</div>
</div>

</div>

</div>

<div class="summary">

<div class="box loan">
Loan Amount
<h2 id="loanBox">₹0</h2>
</div>

<div class="box paid">
Total Paid
<h2 id="paidBox">₹0</h2>
</div>

<div class="box balance">
Balance
<h2 id="balanceBox">₹0</h2>
</div>

<div class="box emi">
Monthly EMI
<h2 id="emiBox">₹0</h2>
</div>

</div>

<div class="actions">

<button class="btn"
onclick="location.href='collect-emi.html?id=' + id">
Collect EMI
</button>

<button class="edit">
Edit Customer
</button>

<button class="delete">
Delete Customer
</button>

<button class="print" onclick="window.print()">
Print
</button>

</div>

</div>

<div class="card">

<h2>Payment History</h2>

<table>

<thead>

<tr>

<th>Date</th>
<th>Amount</th>
<th>Mode</th>
<th>Status</th>

</tr>

</thead>

<tbody id="paymentTable">

<tr>

<td colspan="4">
No Payments Found
</td>

</tr>

</tbody>

</table>

</div>
  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyAZ3Rm_gyY8RgUJUI_AqxeCFpYJIAaWGsk",

authDomain: "hbml-capital.firebaseapp.com",

projectId: "hbml-capital",

storageBucket: "hbml-capital.firebasestorage.app",

messagingSenderId: "893969951538",

appId: "1:893969951538:web:ba028463a6adcfb417c52b"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* GET CUSTOMER ID */

const params = new URLSearchParams(window.location.search);
const customerId = params.get("id");

if(customerId){

loadCustomer(customerId);

}

/* LOAD CUSTOMER */

async function loadCustomer(id){

try{

const customerRef = doc(db,"customers",id);

const customerSnap = await getDoc(customerRef);

if(customerSnap.exists()){

const data = customerSnap.data();

document.getElementById("customerId").innerHTML=id;
document.getElementById("name").innerHTML=data.name || "";
document.getElementById("phone").innerHTML=data.phone || "";
document.getElementById("address").innerHTML=data.address || "";
document.getElementById("loan").innerHTML="₹"+Number(data.loan||0).toLocaleString();
document.getElementById("emi").innerHTML="₹"+Number(data.emi||0).toLocaleString();

document.getElementById("loanBox").innerHTML="₹"+Number(data.loan||0).toLocaleString();

document.getElementById("emiBox").innerHTML="₹"+Number(data.emi||0).toLocaleString();

let totalPaid=0;

/* PAYMENT HISTORY */

const tbody=document.getElementById("paymentTable");

tbody.innerHTML="";

const paymentSnapshot=await getDocs(collection(db,"customers",id,"payments"));

paymentSnapshot.forEach((payment)=>{

const p=payment.data();

totalPaid+=Number(p.amount||0);

tbody.innerHTML+=`

<tr>

<td>${p.date||""}</td>

<td>₹${Number(p.amount||0).toLocaleString()}</td>

<td>${p.mode||"Cash"}</td>

<td>Paid</td>

</tr>

`;

});

if(tbody.innerHTML==""){

tbody.innerHTML=`
<tr>
<td colspan="4">
No Payments Found
</td>
</tr>
`;

}

document.getElementById("paidBox").innerHTML=
"₹"+totalPaid.toLocaleString();

const balance=
Number(data.loan||0)-totalPaid;

document.getElementById("balanceBox").innerHTML=
"₹"+balance.toLocaleString();

}else{

alert("Customer Not Found");

}

}catch(error){

console.log(error);

alert(error.message);

}

}

/* DELETE CUSTOMER */

document.querySelector(".delete").onclick=async function(){

if(confirm("Delete this customer?")){

await deleteDoc(doc(db,"customers",customerId));

alert("Customer Deleted");

window.location.href="view-customers.html";

}

};

/* EDIT CUSTOMER */

document.querySelector(".edit").onclick=function(){

window.location.href="edit-customer.html?id="+customerId;

};

/* EMI COLLECTION */

document.querySelector(".collect").onclick=function(){

window.location.href="emi-collection.html?id="+customerId;

};

</script>

</body>

</html>
