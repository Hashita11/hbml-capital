<!DOCTYPE html>
<html>
<head>

<title>Branch Management</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
max-width:1000px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:20px;
}

.branch{
background:#f7f9fc;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>HBML Branch Management</h1>

<div class="branch">
<h3>Hyderabad Branch</h3>
<p>Total Customers : 120</p>
<p>Monthly Collection : ₹8,50,000</p>
</div>

<div class="branch">
<h3>Vijayawada Branch</h3>
<p>Total Customers : 90</p>
<p>Monthly Collection : ₹5,20,000</p>
</div>

</div>

</body>
</html>
