<!DOCTYPE html>
<html>
<head>
<title>HBML Analytics</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:15px;
}

h1{
text-align:center;
color:#0d2b6b;
margin-bottom:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
color:#0d2b6b;
margin-bottom:10px;
font-size:30px;
}

.card p{
color:#555;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>HBML Analytics Dashboard</h1>

<div class="cards">

<div class="card">
<h2>₹8,50,000</h2>
<p>Total Revenue</p>
</div>

<div class="card">
<h2>150</h2>
<p>Total Customers</p>
</div>

<div class="card">
<h2>92%</h2>
<p>Loan Recovery</p>
</div>

<div class="card">
<h2>25</h2>
<p>Employees</p>
</div>

</div>

</div>

</body>
</html>
